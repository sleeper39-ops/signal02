<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการรหัสผ่าน | Security Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[#f8fafc]">

    <!-- Content Section -->
    <div id="contentSection" class="flex-grow flex flex-col">
        <nav class="bg-[#1e293b] text-white shadow-xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="bg-blue-500/20 p-2 rounded-xl border border-blue-500/30 hover:bg-blue-500/40 transition-all">
                        <i class="ph-bold ph-house text-xl text-blue-400"></i>
                    </a>
                    <h1 class="font-bold text-lg">ระบบจัดการรหัสผ่านส่วนกลาง</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div id="unlockContainer" class="flex items-center gap-2 bg-slate-800 p-1.5 rounded-2xl border border-slate-700">
                        <input type="password" id="masterPassword" placeholder="รหัสผ่าน" class="bg-transparent border-none outline-none text-sm px-3 w-32 font-bold text-white placeholder:text-slate-500">
                        <button onclick="checkUnlock()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2">
                            <i class="ph-bold ph-lock-key-open"></i> ปลดล็อค
                        </button>
                    </div>
                    <div id="lockStatus" class="hidden flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-xl border border-emerald-500/20 text-sm font-bold">
                        <i class="ph-bold ph-check-circle"></i> ปลดล็อคแล้ว
                        <button onclick="lockSystem()" class="ml-2 text-slate-400 hover:text-white transition-colors">
                            <i class="ph-bold ph-lock"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6 py-12 w-full">
            <div id="credentialsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Data will be rendered here -->
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnbOpvNTZ1bNFzReLXMq_wW4kp5iB5oiE",
            authDomain: "signal02-f4d85.firebaseapp.com",
            databaseURL: "https://signal02-f4d85-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "signal02-f4d85",
            storageBucket: "signal02-f4d85.firebasestorage.app",
            messagingSenderId: "653019128612",
            appId: "1:653019128612:web:41d283659202787c4689b1",
            measurementId: "G-3G3TQ0VLXM"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isUnlocked = false;
        let cachedData = [];

        function checkUnlock() {
            const pass = document.getElementById('masterPassword').value;
            if (pass === 'admin2') {
                isUnlocked = true;
                document.getElementById('unlockContainer').classList.add('hidden');
                document.getElementById('lockStatus').classList.remove('hidden');
                renderCredentials(cachedData);
            } else {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        }

        function lockSystem() {
            isUnlocked = false;
            document.getElementById('unlockContainer').classList.remove('hidden');
            document.getElementById('lockStatus').classList.add('hidden');
            document.getElementById('masterPassword').value = '';
            renderCredentials(cachedData);
        }

        function loadData() {
            db.ref('credentials_v2/list').on('value', snapshot => {
                const data = snapshot.val() || [
                    { title: "Email หลัก", subtitle: "Google Account", username: "signal.good2002@gmail.com", password: "Th@IL0@sf2", icon: "ph-bold ph-envelope", bgColor: "bg-red-50", textColor: "text-red-600" },
                    { title: "Gmail / NAS", subtitle: "Backup Account", username: "464qnapnas@gmail.com", password: "Qnapnas464", icon: "ph-bold ph-google-logo", bgColor: "bg-orange-50", textColor: "text-orange-600" },
                    { title: "ระบบ WorkD", subtitle: "Official Mail", username: "sfob_2@rta.mi.th", password: "Sf2@751120", icon: "ph-bold ph-briefcase", bgColor: "bg-blue-50", textColor: "text-blue-600" },
                    { title: "กล้องวงจรปิด", subtitle: "CCTV System", username: "admin", password: "Admin123456", icon: "ph-bold ph-video-camera", bgColor: "bg-slate-100", textColor: "text-slate-600" },
                    { title: "Server 192.168.0.1/444", subtitle: "Local Server", username: "admin", password: "admin", icon: "ph-fill ph-server", bgColor: "bg-indigo-50", textColor: "text-indigo-600" },
                    { title: "NAS 192.168.10.12", subtitle: "Storage System", username: "admin2 / qnap / admin464", password: "Qnapnas464", icon: "ph-bold ph-database", bgColor: "bg-emerald-50", textColor: "text-emerald-600" },
                    { title: "Gemini Pro", subtitle: "AI Account", username: "signal2026.x1@gmail.com", password: "@xx112026", icon: "ph-bold ph-sparkle", bgColor: "bg-purple-50", textColor: "text-purple-600" },
                    { title: "Canva Business", subtitle: "Design Account", username: "signal2026.x2@gmail.com", password: "@xx222026", icon: "ph-bold ph-paint-brush", bgColor: "bg-teal-50", textColor: "text-teal-600" }
                ];
                cachedData = data;
                renderCredentials(data);
            });
        }

        function renderCredentials(data) {
            const grid = document.getElementById('credentialsGrid');
            grid.innerHTML = data.map((item, index) => `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 hover:border-blue-400 transition-all group">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 ${item.bgColor} ${item.textColor} rounded-2xl flex items-center justify-center group-hover:bg-opacity-100 transition-colors">
                            <i class="${item.icon} text-2xl"></i>
                        </div>
                        <div>
                            <h3 class="font-black text-slate-800">${item.title}</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${item.subtitle}</p>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative group/user">
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Username / Email</p>
                            <p class="font-bold text-slate-700 break-all">${item.username}</p>
                            ${isUnlocked ? `
                            <button onclick="editField(${index}, 'username')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-blue-600 transition-all">
                                <i class="ph ph-pencil-simple text-lg"></i>
                            </button>
                            ` : ''}
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative group/pass">
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Password</p>
                            <p class="font-bold text-slate-700 password-field" data-pass="${item.password}">${isUnlocked ? item.password : '••••••••'}</p>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-3">
                                ${isUnlocked ? `
                                <button onclick="editField(${index}, 'password')" class="text-slate-300 hover:text-blue-600 transition-colors">
                                    <i class="ph ph-pencil-simple text-xl"></i>
                                </button>
                                ` : `
                                <button onclick="togglePass(this)" class="text-slate-300 hover:text-blue-600 transition-colors">
                                    <i class="ph-bold ph-eye text-xl"></i>
                                </button>
                                `}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function editField(index, field) {
            if (!isUnlocked) {
                alert("กรุณาปลดล็อคระบบก่อนดำเนินการแก้ไข");
                return;
            }
            db.ref(`credentials_v2/list/${index}`).once('value', async snapshot => {
                const currentData = snapshot.val();
                const newVal = prompt(`แก้ไข ${field}:`, currentData ? currentData[field] : "");
                if (newVal !== null) {
                    await db.ref(`credentials_v2/list/${index}/${field}`).set(newVal);
                }
            });
        }

        function togglePass(btn) {
            if (isUnlocked) return; // All passwords already shown

            const field = btn.closest('.group\\/pass').querySelector('.password-field');
            const icon = btn.querySelector('i');
            const realPass = field.getAttribute('data-pass');
            
            if (field.innerText === '••••••••') {
                const masterPass = prompt("กรุณาระบุรหัสผ่านเพื่อดูรหัส:");
                if (masterPass !== 'admin2') {
                    alert("รหัสผ่านไม่ถูกต้อง!");
                    return;
                }
                field.innerText = realPass;
                icon.classList.remove('ph-eye');
                icon.classList.add('ph-eye-closed');
            } else {
                field.innerText = '••••••••';
                icon.classList.remove('ph-eye-closed');
                icon.classList.add('ph-eye');
            }
        }

        async function seedInitialData() {
            if (!confirm('ยืนยันการรีเซ็ตข้อมูลทั้งหมดเป็นค่าเริ่มต้น?')) return;
            const initial = [
                { title: "Email หลัก", subtitle: "Google Account", username: "signal.good2002@gmail.com", password: "Th@IL0@sf2", icon: "ph-bold ph-envelope", bgColor: "bg-red-50", textColor: "text-red-600" },
                { title: "Gmail / NAS", subtitle: "Backup Account", username: "464qnapnas@gmail.com", password: "Qnapnas464", icon: "ph-bold ph-google-logo", bgColor: "bg-orange-50", textColor: "text-orange-600" },
                { title: "ระบบ WorkD", subtitle: "Official Mail", username: "sfob_2@rta.mi.th", password: "Sf2@751120", icon: "ph-bold ph-briefcase", bgColor: "bg-blue-50", textColor: "text-blue-600" },
                { title: "กล้องวงจรปิด", subtitle: "CCTV System", username: "admin", password: "Admin123456", icon: "ph-bold ph-video-camera", bgColor: "bg-slate-100", textColor: "text-slate-600" },
                { title: "Server 192.168.0.1/444", subtitle: "Local Server", username: "admin", password: "admin", icon: "ph-fill ph-server", bgColor: "bg-indigo-50", textColor: "text-indigo-600" },
                { title: "NAS 192.168.10.12", subtitle: "Storage System", username: "admin2 / qnap / admin464", password: "Qnapnas464", icon: "ph-bold ph-database", bgColor: "bg-emerald-50", textColor: "text-emerald-600" },
                { title: "Gemini Pro", subtitle: "AI Account", username: "signal2026.x1@gmail.com", password: "@xx112026", icon: "ph-bold ph-sparkle", bgColor: "bg-purple-50", textColor: "text-purple-600" },
                { title: "Canva Business", subtitle: "Design Account", username: "signal2026.x2@gmail.com", password: "@xx222026", icon: "ph-bold ph-paint-brush", bgColor: "bg-teal-50", textColor: "text-teal-600" }
            ];
            await db.ref('credentials_v2/list').set(initial);
            alert('รีเซ็ตข้อมูลเรียบร้อยแล้ว');
        }

        // Load data on page load
        window.onload = () => {
            loadData();
        };
    </script>
</body>
</html>
