<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเครือข่าย ศสส.บก.ควบคุม 2 (v6.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f2f5; color: #050505; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .modal-active { overflow: hidden; }
        
        /* แถบสีด้านหน้าสำหรับระบุประเภทอุปกรณ์ (ไม่มีสีพื้นหลังแถว) - คงเดิม */
        .device-server { border-left: 6px solid #ef4444 !important; } /* แดง */
        .device-pc { border-left: 6px solid #3b82f6 !important; }     /* น้ำเงิน */
        .device-notebook { border-left: 6px solid #22c55e !important; } /* เขียว */
        .device-fax { border-left: 6px solid #eab308 !important; }     /* เหลือง */
        .device-default { border-left: 6px solid #94a3b8 !important; }   /* เทา */

        /* สไตล์ Badge ประเภทอุปกรณ์ - คงเดิม */
        .badge-red { color: #ef4444; border: 1px solid #fecaca; background: transparent; }
        .badge-blue { color: #3b82f6; border: 1px solid #bfdbfe; background: transparent; }
        .badge-green { color: #22c55e; border: 1px solid #bbf7d0; background: transparent; }
        .badge-yellow { color: #854d0e; border: 1px solid #fef08a; background: transparent; }
        .badge-gray { color: #64748b; border: 1px solid #e2e8f0; background: transparent; }

        .ip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }

        /* ปรับขนาด Font เมนูซ้าย */
        .sidebar-btn { font-size: 1.15rem !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1877F2; border-radius: 4px; }
    </style>
</head>
<body class="antialiased">

    <nav class="bg-[#1877F2] text-white shadow-xl sticky top-0 z-50 border-b border-[#166FE5]">
        <div class="max-w-full mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-white/20 p-2 rounded-xl shadow-sm">
                    <i class="fa-solid fa-network-wired text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-tight leading-none uppercase text-white">NMS CONTROL 2</h1>
                    <span class="text-[11px] text-white/80 font-medium tracking-widest uppercase">Network Admin System</span>
                </div>
            </div>
            <div class="hidden md:flex gap-6 text-sm font-bold">
                <div class="flex items-center gap-2 text-white/90"><div class="w-2.5 h-2.5 bg-green-400 rounded-full"></div> ใช้งาน: <span id="usedCount" class="text-white">0</span></div>
                <div class="flex items-center gap-2 text-white/70"><div class="w-2.5 h-2.5 bg-white/40 rounded-full"></div> ว่าง: <span id="unusedCount" class="text-white">0</span></div>
            </div>
        </div>
    </nav>

    <div class="max-w-full mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-[1.5rem] shadow-sm border border-slate-200 sticky top-24">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center pl-2 border-l-4 border-slate-300">ฝ่าย / หน่วยงาน</h3>
                    <div class="flex flex-col gap-2" id="deptMenu"></div>

                    <hr class="my-6 border-slate-100">
                    
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center pl-2 border-l-4 border-slate-300">ชนิดอุปกรณ์</h3>
                    <div class="flex flex-col gap-2" id="typeMenu"></div>

                    <hr class="my-6 border-slate-100">

                    <button onclick="toggleIpView()" id="btnIpMap" class="w-full sidebar-btn text-left px-5 py-3 rounded-xl font-semibold transition-all bg-slate-100 text-slate-600 hover:bg-slate-200 mb-3 border border-slate-200">
                        <i class="fa-solid fa-table-cells mr-2 text-slate-400"></i> ดูแผนผัง IP
                    </button>
                    <button onclick="openModal()" class="w-full bg-[#1877F2] hover:bg-[#166FE5] text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95 sidebar-btn">
                        <i class="fa-solid fa-plus-circle"></i> เพิ่มอุปกรณ์
                    </button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="filterDevices()" placeholder="ค้นหาชื่ออุปกรณ์, หมายเลข IP, ฝ่าย..." class="w-full pl-16 pr-8 py-4 rounded-[1.5rem] border-2 border-white focus:border-slate-300 bg-white shadow-sm outline-none transition-all text-base font-medium">
                </div>

                <div id="tableView" class="bg-white rounded-[1.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">ข้อมูลอุปกรณ์</th>
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">ประเภท</th>
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">หมายเลข IP</th>
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">ฝ่ายที่รับผิดชอบ</th>
                                    <th class="px-8 py-5 text-center text-xs font-black text-slate-500 uppercase tracking-widest">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="deviceTableBody" class="divide-y divide-slate-100 font-medium"></tbody>
                        </table>
                    </div>
                </div>

                <div id="ipMapView" class="hidden bg-white p-10 rounded-[1.5rem] shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-3">
                        <i class="fa-solid fa-network-wired text-slate-400"></i> แผนผังไอพี (192.168.10.x)
                    </h2>
                    <div class="ip-grid" id="ipGridContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="deviceModal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-md flex justify-center items-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
            <div class="px-10 py-7 bg-slate-50 border-b border-slate-200 flex justify-between items-center text-slate-900">
                <h3 class="text-lg font-bold" id="modalTitle">ลงทะเบียนอุปกรณ์</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-200 text-slate-400 transition-all">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <form id="deviceForm" onsubmit="handleSave(event)" class="p-10 space-y-6 text-sm">
                <input type="hidden" id="deviceId">
                <div>
                    <label class="block font-black text-slate-500 mb-2 uppercase text-[11px] tracking-widest">ชื่ออุปกรณ์ / รายละเอียด</label>
                    <input type="text" id="deviceName" required class="w-full px-5 py-3.5 rounded-xl border border-slate-200 focus:border-slate-500 outline-none bg-slate-50 font-semibold" placeholder="ระบุชื่อเรียกอุปกรณ์">
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block font-black text-slate-500 mb-2 uppercase text-[11px] tracking-widest">ประเภทอุปกรณ์</label>
                        <select id="deviceType" required class="w-full px-5 py-3.5 rounded-xl border border-slate-200 focus:border-slate-500 outline-none bg-white font-semibold">
                            <option value="PC">คอมพิวเตอร์ (PC)</option>
                            <option value="Notebook">โน้ตบุ๊ก (Notebook)</option>
                            <option value="Printer">ปริ้นเตอร์ (Printer)</option>
                            <option value="Mobile">มือถือ (Mobile)</option>
                            <option value="iPad">ไอแพด (iPad)</option>
                            <option value="Server">เซิร์ฟเวอร์ (Server)</option>
                            <option value="Router">เราเตอร์ (Router/Wi-Fi)</option>
                            <option value="Switch">สวิตช์ฮับ (Switch)</option>
                            <option value="Fax">แฟกซ์ (Fax)</option>
                            <option value="Other">อุปกรณ์อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-black text-slate-500 mb-2 uppercase text-[11px] tracking-widest">หมายเลข IP Address</label>
                        <input type="text" id="deviceIp" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 focus:border-slate-500 outline-none mono font-bold text-blue-600" placeholder="192.168.10.x">
                    </div>
                </div>
                <div>
                    <label class="block font-black text-slate-500 mb-2 uppercase text-[11px] tracking-widest">ฝ่ายที่รับผิดชอบ</label>
                    <select id="deviceDept" required class="w-full px-5 py-3.5 rounded-xl border border-slate-200 focus:border-slate-500 outline-none bg-white font-semibold">
                        <option value="ส่วนกลาง">ส่วนกลาง / ระบบหลัก</option>
                        <option value="ศสส.">ศสส.</option>
                        <option value="ฝขว.">ฝขว.</option>
                        <option value="ฝยก.">ฝยก.</option>
                        <option value="250">250.</option>
                        <option value="ปจว.">ปจว.</option>
                        <option value="ฝปส.">ฝปส.</option>
                        <option value="ฝยส.">ฝยส.</option>
                        <option value="ศสน.">ศสน.</option>
                    </select>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 px-8 py-4 rounded-xl font-bold bg-slate-100 text-slate-500 hover:bg-slate-200">ยกเลิก</button>
                    <button type="submit" class="flex-1 px-8 py-4 rounded-xl font-bold bg-[#1877F2] text-white hover:bg-[#166FE5] shadow-lg transition-all transform active:scale-95 uppercase text-xs">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 1. ข้อมูลเริ่มต้น ---
        let devices = [
            { id: 1, name: 'Firewall/Server หลัก', type: 'Server', ip: '192.168.10.1', dept: 'ส่วนกลาง' },
            { id: 2, name: 'Server ศสส.', type: 'Server', ip: '192.168.10.50', dept: 'ศสส.' },
            { id: 3, name: 'PC ศสส. 01', type: 'PC', ip: '192.168.10.51', dept: 'ศสส.' },
            { id: 4, name: 'Fax ศูนย์สารสนเทศ', type: 'Fax', ip: '-', dept: 'ศสส.' },
            { id: 5, name: 'PC ฝขว. (จุด 76)', type: 'PC', ip: '192.168.10.76', dept: 'ฝขว.' },
            { id: 6, name: 'Notebook ฝขว.', type: 'Notebook', ip: '192.168.10.64', dept: 'ฝขว.' },
            { id: 7, name: 'Server ฝยก.', type: 'Server', ip: '192.168.10.100', dept: 'ฝยก.' },
            { id: 8, name: 'iPad ฝปส.', type: 'iPad', ip: '192.168.10.128', dept: 'ฝปส.' },
            { id: 9, name: 'Mobile ปจว.', type: 'Mobile', ip: '192.168.10.125', dept: 'ปจว.' },
            { id: 10, name: 'Printer ฝยก.', type: 'Printer', ip: '192.168.10.105', dept: 'ฝยก.' },
            { id: 11, name: 'Router Gateway 02', type: 'Router', ip: '192.168.20.1', dept: 'ส่วนกลาง' }
        ];

        let currentDept = 'ทั้งหมด';
        let currentTypeFilter = 'ทั้งหมด';
        let viewMode = 'table';

        const depts = ['ทั้งหมด', 'ส่วนกลาง', 'ศสส.', 'ฝขว.', 'ฝยก.', '250', 'ปจว.', 'ฝปส.', 'ฝยส.', 'ศสน.'];
        const types = ['ทั้งหมด', 'Server', 'PC', 'Notebook', 'Fax', 'Printer', 'Mobile', 'iPad', 'Router', 'Switch'];

        // --- 2. การจัดการสีไอคอนและลำดับไอพี ---
        function parseIP(ip) {
            if (!ip || ip === '-') return [999, 999, 999, 999]; // ให้ไอพีว่างไปอยู่ล่างสุด
            let parts = ip.split('.').map(Number);
            return parts.length === 4 ? parts : [999, 999, 999, 999];
        }

        function sortDevicesByIP(list) {
            return list.sort((a, b) => {
                const ipA = parseIP(a.ip);
                const ipB = parseIP(b.ip);
                for (let i = 0; i < 4; i++) {
                    if (ipA[i] !== ipB[i]) return ipA[i] - ipB[i];
                }
                return 0;
            });
        }

        function getDeviceTypeClass(type) {
            switch(type) {
                case 'Server': return 'device-server';
                case 'PC': return 'device-pc';
                case 'Notebook': return 'device-notebook';
                case 'Fax': return 'device-fax';
                default: return 'device-default';
            }
        }

        function getBadgeStyle(type) {
            switch(type) {
                case 'Server': return 'badge-red';
                case 'PC': return 'badge-blue';
                case 'Notebook': return 'badge-green';
                case 'Fax': return 'badge-yellow';
                default: return 'badge-gray';
            }
        }

        function getDeviceIcon(type) {
            const icons = {
                'PC': 'fa-desktop', 'Notebook': 'fa-laptop', 'Printer': 'fa-print',
                'Mobile': 'fa-mobile-screen', 'iPad': 'fa-tablet-screen-button',
                'Server': 'fa-server', 'Router': 'fa-wifi', 'Switch': 'fa-network-wired',
                'Fax': 'fa-fax'
            };
            return icons[type] || 'fa-microchip';
        }

        function getDeviceIconColor(type) {
            const colors = {
                'Server': '#ef4444',
                'PC': '#3b82f6',
                'Notebook': '#22c55e',
                'Fax': '#eab308',
                'Printer': '#94a3b8',
                'Mobile': '#94a3b8',
                'iPad': '#94a3b8',
                'Router': '#94a3b8',
                'Switch': '#94a3b8',
                'Other': '#94a3b8'
            };
            return colors[type] || '#94a3b8';
        }

        // --- 3. การเรนเดอร์ UI ---
        function renderFilters() {
            const deptContainer = document.getElementById('deptMenu');
            deptContainer.innerHTML = depts.map(d => `
                <button onclick="setFilter('dept', '${d}')" class="sidebar-btn flex justify-between items-center px-4 py-3 rounded-xl font-bold transition-all ${currentDept === d ? 'bg-[#1877F2] text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}">
                    <span>${d}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full ${currentDept === d ? 'bg-white/20' : 'bg-slate-200'}">
                        ${d === 'ทั้งหมด' ? devices.length : devices.filter(x => x.dept === d).length}
                    </span>
                </button>
            `).join('');

            const typeContainer = document.getElementById('typeMenu');
            typeContainer.innerHTML = types.map(t => `
                <button onclick="setFilter('type', '${t}')" class="sidebar-btn flex justify-between items-center px-4 py-3 rounded-xl font-bold transition-all ${currentTypeFilter === t ? 'bg-[#1877F2] text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}">
                    <span>${t}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full ${currentTypeFilter === t ? 'bg-white/20' : 'bg-slate-200'}">
                        ${t === 'ทั้งหมด' ? devices.length : devices.filter(x => x.type === t).length}
                    </span>
                </button>
            `).join('');
        }

        function renderTable(dataToRender) {
            const tbody = document.getElementById('deviceTableBody');
            const sortedData = sortDevicesByIP([...dataToRender]);

            if (sortedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-24 text-center text-slate-300 font-bold italic tracking-widest uppercase">ไม่พบข้อมูลอุปกรณ์</td></tr>`;
                updateStats(); return;
            }

            tbody.innerHTML = sortedData.map(d => `
                <tr class="hover:bg-slate-50/50 transition-all ${getDeviceTypeClass(d.type)} bg-white">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-50 border border-slate-100">
                                <i class="fa-solid ${getDeviceIcon(d.type)} text-base" style="color: ${getDeviceIconColor(d.type)}"></i>
                            </div>
                            <span class="font-bold text-slate-700 tracking-tight">${d.name}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-sm">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase border tracking-widest ${getBadgeStyle(d.type)}">
                            ${d.type}
                        </span>
                    </td>
                    <td class="px-8 py-5 mono font-bold text-blue-600 text-[13px]">${d.ip || '-'}</td>
                    <td class="px-8 py-5">
                        <span class="px-3 py-1 rounded-xl text-[11px] font-bold bg-slate-100 text-slate-500">
                            ${d.dept}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <div class="flex justify-center gap-2.5">
                            <button onclick="editDevice(${d.id})" class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center shadow-sm"><i class="fa-solid fa-pencil text-xs"></i></button>
                            <button onclick="deleteDevice(${d.id})" class="w-10 h-10 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white transition-all flex items-center justify-center shadow-sm"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            updateStats();
        }

        function renderIpMap() {
            const container = document.getElementById('ipGridContainer');
            let html = '';
            let used = 0;
            for(let i = 1; i <= 255; i++) {
                const ipStr = `192.168.10.${i}`;
                const device = devices.find(d => d.ip === ipStr);
                if(device) {
                    used++;
                    html += `
                        <div onclick="editDevice(${device.id})" class="p-4 rounded-2xl border-3 ${getBadgeStyle(device.type)} cursor-pointer text-center shadow-lg hover:scale-105 transition-all relative group bg-white">
                            <div class="text-lg font-black opacity-100 mb-2 leading-none">.${i}</div>
                            <i class="fa-solid ${getDeviceIcon(device.type)} text-3xl mb-2" style="color: ${getDeviceIconColor(device.type)}"></i>
                            <div class="text-xs font-bold uppercase tracking-wide">${device.type}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div onclick="addWithIp('${ipStr}')" class="p-4 rounded-2xl bg-gray-50 border-2 border-dashed border-gray-300 text-gray-600 hover:border-green-400 hover:bg-green-50 hover:text-green-600 cursor-pointer text-center group transition-all">
                            <div class="text-base font-black opacity-80 mb-2 leading-none">.${i}</div>
                            <i class="fa-solid fa-plus text-2xl mb-2 opacity-60 group-hover:opacity-100"></i>
                            <div class="text-sm font-bold uppercase tracking-wide">ว่าง</div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            updateStats(used);
        }

        // --- 4. ตรรกะระบบ ---
        function setFilter(type, value) {
            if(type === 'dept') currentDept = value;
            else currentTypeFilter = value;
            viewMode = 'table';
            document.getElementById('tableView').classList.remove('hidden');
            document.getElementById('ipMapView').classList.add('hidden');
            renderFilters();
            filterDevices();
        }

        function toggleIpView() {
            viewMode = 'ipmap';
            document.getElementById('tableView').classList.add('hidden');
            document.getElementById('ipMapView').classList.remove('hidden');
            renderIpMap();
        }

        function filterDevices() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = devices.filter(d => {
                const matchDept = (currentDept === 'ทั้งหมด' || d.dept === currentDept);
                const matchType = (currentTypeFilter === 'ทั้งหมด' || d.type === currentTypeFilter);
                const matchQuery = (d.name.toLowerCase().includes(q) || (d.ip && d.ip.toLowerCase().includes(q)));
                return matchDept && matchType && matchQuery;
            });
            renderTable(filtered);
        }

        function updateStats(usedCount = null) {
            const used = usedCount !== null ? usedCount : devices.filter(d => d.ip && d.ip.startsWith('192.168.10.')).length;
            document.getElementById('usedCount').innerText = used;
            document.getElementById('unusedCount').innerText = 255 - used;
        }

        function openModal(id = null) {
            const m = document.getElementById('deviceModal');
            document.getElementById('deviceForm').reset();
            document.getElementById('deviceId').value = '';
            document.getElementById('modalTitle').innerText = 'ลงทะเบียนอุปกรณ์ใหม่';
            if(id) {
                const d = devices.find(x => x.id === id);
                document.getElementById('deviceId').value = d.id;
                document.getElementById('deviceName').value = d.name;
                document.getElementById('deviceType').value = d.type;
                document.getElementById('deviceIp').value = d.ip || '';
                document.getElementById('deviceDept').value = d.dept;
                document.getElementById('modalTitle').innerText = 'แก้ไขรายละเอียดอุปกรณ์';
            }
            m.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() { document.getElementById('deviceModal').classList.add('hidden'); document.body.classList.remove('modal-active'); }

        function handleSave(event) {
            event.preventDefault();
            const id = document.getElementById('deviceId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('deviceName').value,
                type: document.getElementById('deviceType').value,
                ip: document.getElementById('deviceIp').value,
                dept: document.getElementById('deviceDept').value
            };
            if(id) { const idx = devices.findIndex(x => x.id === parseInt(id)); devices[idx] = data; }
            else { devices.push(data); }
            closeModal();
            renderFilters();
            if(viewMode === 'ipmap') renderIpMap(); else filterDevices();
        }

        function addWithIp(ip) { openModal(); document.getElementById('deviceIp').value = ip; }
        function editDevice(id) { openModal(id); }
        function deleteDevice(id) { if(confirm('⚠️ ยืนยันการลบข้อมูลอุปกรณ์นี้ออกจากระบบ?')) { devices = devices.filter(x => x.id !== id); renderFilters(); if(viewMode === 'ipmap') renderIpMap(); else filterDevices(); } }

        window.onload = () => { renderFilters(); renderTable(devices); };
    </script>
</body>
</html>
