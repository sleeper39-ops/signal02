<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเครือข่าย ศสส.บก.ควบคุม 2 (v5.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #334155; font-size: 0.95rem; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .modal-active { overflow: hidden; }
        
        /* สไตล์สีเฉพาะอุปกรณ์ */
        .device-server { border-left: 6px solid #ef4444 !important; background-color: #fff1f2; } /* แดง */
        .device-pc { border-left: 6px solid #3b82f6 !important; background-color: #eff6ff; }     /* น้ำเงิน */
        .device-notebook { border-left: 6px solid #22c55e !important; background-color: #f0fdf4; } /* เขียว */
        .device-fax { border-left: 6px solid #eab308 !important; background-color: #fefce8; }     /* เหลือง */
        .device-default { border-left: 6px solid #94a3b8 !important; background-color: #f8fafc; }   /* เทา */

        .badge-red { background-color: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .badge-blue { background-color: #dbeafe; color: #3b82f6; border: 1px solid #bfdbfe; }
        .badge-green { background-color: #dcfce7; color: #22c55e; border: 1px solid #bbf7d0; }
        .badge-yellow { background-color: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .badge-gray { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }

        .ip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    </style>
</head>
<body class="antialiased">

    <nav class="bg-slate-800 text-white shadow-xl sticky top-0 z-50 border-b border-slate-700">
        <div class="max-w-full mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-slate-600 p-2 rounded-xl shadow-inner">
                    <i class="fa-solid fa-server text-xl text-slate-200"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-tight leading-none uppercase">NMS CONTROL 2</h1>
                    <span class="text-[11px] text-slate-400 font-medium tracking-widest uppercase">IP Management System v5.0</span>
                </div>
            </div>
            <div class="hidden md:flex gap-6 text-sm font-bold uppercase tracking-wider">
                <div class="flex items-center gap-2"><div class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.6)]"></div> ใช้แล้ว: <span id="usedCount">0</span></div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 bg-slate-500 rounded-full"></div> ไอพีว่าง: <span id="unusedCount">0</span></div>
            </div>
        </div>
    </nav>

    <div class="max-w-full mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center pl-2 border-l-4 border-slate-300">แยกตามฝ่าย</h3>
                    <div class="flex flex-col gap-2" id="deptMenu"></div>

                    <hr class="my-6 border-slate-100">
                    
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center pl-2 border-l-4 border-slate-300">แยกตามอุปกรณ์</h3>
                    <div class="flex flex-col gap-2" id="typeMenu"></div>

                    <hr class="my-6 border-slate-100">

                    <button onclick="toggleIpView()" id="btnIpMap" class="w-full text-left px-5 py-3.5 rounded-2xl text-xs font-bold transition-all bg-slate-100 text-slate-600 hover:bg-slate-200 mb-3 border border-slate-200">
                        <i class="fa-solid fa-table-cells mr-2 text-slate-400"></i> แผนผัง IP ทั้งหมด
                    </button>
                    <button onclick="openModal()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg shadow-slate-300 transition-all active:scale-95 text-sm uppercase">
                        <i class="fa-solid fa-plus-circle"></i> เพิ่มอุปกรณ์
                    </button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                
                <div class="relative group">
                    <i class="fa-solid fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-slate-600"></i>
                    <input type="text" id="searchInput" onkeyup="filterDevices()" placeholder="ค้นหาชื่ออุปกรณ์, หมายเลข IP, ฝ่าย..." class="w-full pl-16 pr-8 py-4.5 rounded-[2rem] border-2 border-transparent focus:border-slate-300 bg-white shadow-sm outline-none transition-all text-base font-medium">
                </div>

                <div id="tableView" class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200">
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">ข้อมูลอุปกรณ์</th>
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">ประเภท</th>
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">IP Address</th>
                                    <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">หน่วยงาน</th>
                                    <th class="px-8 py-5 text-center text-xs font-black text-slate-500 uppercase tracking-widest">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="deviceTableBody" class="divide-y divide-slate-100 font-medium"></tbody>
                        </table>
                    </div>
                </div>

                <div id="ipMapView" class="hidden bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-200 animate-in fade-in duration-500">
                    <h2 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-3">
                        <i class="fa-solid fa-network-wired text-slate-400"></i> โครงสร้างการจ่ายไอพี (192.168.10.1 - 255)
                    </h2>
                    <div class="ip-grid" id="ipGridContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="deviceModal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-md flex justify-center items-center p-4">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-lg overflow-hidden transition-all scale-100 border border-slate-100">
            <div class="px-10 py-8 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800" id="modalTitle">ลงทะเบียนอุปกรณ์</h3>
                <button onclick="closeModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl hover:bg-slate-200 text-slate-400 transition-all">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="deviceForm" onsubmit="handleSave(event)" class="p-10 space-y-6 text-sm">
                <input type="hidden" id="deviceId">
                <div>
                    <label class="block font-black text-slate-500 mb-2 uppercase tracking-wider text-xs">ชื่ออุปกรณ์ / รายละเอียด</label>
                    <input type="text" id="deviceName" required class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-slate-400 outline-none bg-slate-50 font-bold transition-all" placeholder="เช่น PC ฝขว. 01">
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block font-black text-slate-500 mb-2 uppercase tracking-wider text-xs">ประเภทอุปกรณ์</label>
                        <select id="deviceType" required class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-slate-400 outline-none bg-white font-bold transition-all">
                            <option value="PC">Computer (PC)</option>
                            <option value="Notebook">Notebook</option>
                            <option value="Printer">Printer (ปริ้นเตอร์)</option>
                            <option value="Mobile">Mobile (มือถือ)</option>
                            <option value="iPad">iPad (ไอแพด)</option>
                            <option value="Server">Server</option>
                            <option value="Router">Router/Wi-Fi</option>
                            <option value="Switch">Switch Hub</option>
                            <option value="Fax">เครื่องแฟกซ์</option>
                            <option value="Other">อุปกรณ์อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-black text-slate-500 mb-2 uppercase tracking-wider text-xs">เลข IP Address</label>
                        <input type="text" id="deviceIp" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-slate-400 outline-none mono font-bold text-blue-600 bg-white transition-all" placeholder="192.168.10.x">
                    </div>
                </div>
                <div>
                    <label class="block font-black text-slate-500 mb-2 uppercase tracking-wider text-xs">ฝ่ายที่รับผิดชอบ</label>
                    <select id="deviceDept" required class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-slate-400 outline-none bg-white font-bold transition-all">
                        <option value="ส่วนกลาง">ส่วนกลาง / ระบบหลัก</option>
                        <option value="ศสส.">ศสส.</option>
                        <option value="ฝขว.">ฝขว.</option>
                        <option value="ฝยก.">ฝยก.</option>
                        <option value="หน่วย 250">หน่วย 250.</option>
                        <option value="ปจว.">ปจว.</option>
                        <option value="ฝปส.">ฝปส.</option>
                        <option value="ฝยส.">ฝยส.</option>
                        <option value="ศสน.">ศสน.</option>
                    </select>
                </div>

                <div class="pt-8 flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 px-8 py-4.5 rounded-2xl font-bold bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all uppercase text-xs">ยกเลิก</button>
                    <button type="submit" class="flex-1 px-8 py-4.5 rounded-2xl font-bold bg-slate-800 text-white hover:bg-slate-900 shadow-xl shadow-slate-200 transition-all transform active:scale-95 uppercase text-xs">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 1. ข้อมูลเริ่มต้นดึงจากไฟล์หลัก ---
        let devices = [
            { id: 1, name: 'Firewall/Server หลัก', type: 'Server', ip: '192.168.10.1', dept: 'ส่วนกลาง' },
            { id: 2, name: 'Server ศสส.', type: 'Server', ip: '192.168.10.50', dept: 'ศสส.' },
            { id: 3, name: 'PC ศสส. (งานฐานข้อมูล)', type: 'PC', ip: '192.168.10.51', dept: 'ศสส.' },
            { id: 4, name: 'Fax ศูนย์สารสนเทศ', type: 'Fax', ip: '-', dept: 'ศสส.' },
            { id: 5, name: 'Printer งานข่าว (ฝขว.)', type: 'Printer', ip: '192.168.10.70', dept: 'ฝขว.' },
            { id: 6, name: 'Notebook เจ้าหน้าที่ ฝขว.', type: 'Notebook', ip: '192.168.10.64', dept: 'ฝขว.' },
            { id: 7, name: 'Server ประจำฝ่าย ฝยก.', type: 'Server', ip: '192.168.10.100', dept: 'ฝยก.' },
            { id: 8, name: 'PC ประจำฝ่าย ฝยก. 02', type: 'PC', ip: '192.168.10.102', dept: 'ฝยก.' },
            { id: 9, name: 'iPad สำหรับตรวจงาน (ฝปส.)', type: 'iPad', ip: '192.168.10.128', dept: 'ฝปส.' },
            { id: 10, name: 'Mobile กองร้อย 01', type: 'Mobile', ip: '192.168.10.125', dept: 'ปจว.' },
            { id: 11, name: 'PC หน่วย 250.', type: 'PC', ip: '192.168.10.116', dept: 'หน่วย 250' },
            { id: 12, name: 'Router Gateway 02', type: 'Router', ip: '192.168.20.1', dept: 'ส่วนกลาง' }
        ];

        let currentDept = 'ทั้งหมด';
        let currentTypeFilter = 'ทั้งหมด';
        let viewMode = 'table';

        const depts = ['ทั้งหมด', 'ส่วนกลาง', 'ศสส.', 'ฝขว.', 'ฝยก.', 'หน่วย 250', 'ปจว.', 'ฝปส.', 'ฝยส.', 'ศสน.'];
        const types = ['ทั้งหมด', 'Server', 'PC', 'Notebook', 'Fax', 'Printer', 'Mobile', 'iPad', 'Router', 'Switch'];

        // --- 2. ฟังก์ชันเรียงลำดับไอพี (Numeric Octet Sorting) ---
        function parseIP(ip) {
            if (!ip || ip === '-') return [0, 0, 0, 0];
            // สำหรับช่วงไอพี 160-175 ให้ใช้เลขเริ่มต้น
            let cleanIp = ip.split('-')[0].trim();
            let parts = cleanIp.split('.').map(Number);
            return parts.length === 4 ? parts : [0, 0, 0, 0];
        }

        function sortDevicesByIP(list) {
            return list.sort((a, b) => {
                const ipA = parseIP(a.ip);
                const ipB = parseIP(b.ip);
                for (let i = 0; i < 4; i++) {
                    if (ipA[i] !== ipB[i]) return ipA[i] - ipB[i];
                }
                return 0;
            });
        }

        // --- 3. การจัดการสีและไอคอนตามเงื่อนไขใหม่ ---
        function getDeviceRowStyle(type) {
            switch(type) {
                case 'Server': return 'device-server';
                case 'PC': return 'device-pc';
                case 'Notebook': return 'device-notebook';
                case 'Fax': return 'device-fax';
                default: return 'device-default';
            }
        }

        function getBadgeStyle(type) {
            switch(type) {
                case 'Server': return 'badge-red';
                case 'PC': return 'badge-blue';
                case 'Notebook': return 'badge-green';
                case 'Fax': return 'badge-yellow';
                default: return 'badge-gray';
            }
        }

        function getDeviceIcon(type) {
            const icons = {
                'PC': 'fa-desktop', 'Notebook': 'fa-laptop', 'Printer': 'fa-print',
                'Mobile': 'fa-mobile-screen', 'iPad': 'fa-tablet-screen-button',
                'Server': 'fa-server', 'Router': 'fa-wifi', 'Switch': 'fa-network-wired',
                'Fax': 'fa-fax'
            };
            return icons[type] || 'fa-microchip';
        }

        // --- 4. การเรนเดอร์ UI ---
        function renderFilters() {
            const deptContainer = document.getElementById('deptMenu');
            deptContainer.innerHTML = depts.map(d => `
                <button onclick="setFilter('dept', '${d}')" class="flex justify-between items-center px-4 py-3 rounded-2xl text-xs font-bold transition-all ${currentDept === d ? 'bg-slate-700 text-white shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-200'}">
                    <span>${d}</span>
                    <span class="text-[9px] px-2 py-0.5 rounded-full ${currentDept === d ? 'bg-white/20' : 'bg-slate-200'}">
                        ${d === 'ทั้งหมด' ? devices.length : devices.filter(x => x.dept === d).length}
                    </span>
                </button>
            `).join('');

            const typeContainer = document.getElementById('typeMenu');
            typeContainer.innerHTML = types.map(t => `
                <button onclick="setFilter('type', '${t}')" class="flex justify-between items-center px-4 py-3 rounded-2xl text-xs font-bold transition-all ${currentTypeFilter === t ? 'bg-slate-700 text-white shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-200'}">
                    <span>${t}</span>
                    <span class="text-[9px] px-2 py-0.5 rounded-full ${currentTypeFilter === t ? 'bg-white/20' : 'bg-slate-200'}">
                        ${t === 'ทั้งหมด' ? devices.length : devices.filter(x => x.type === t).length}
                    </span>
                </button>
            `).join('');
        }

        function renderTable(dataToRender) {
            const tbody = document.getElementById('deviceTableBody');
            
            // เรียงลำดับไอพีก่อนแสดงผลเสมอ
            const sortedData = sortDevicesByIP([...dataToRender]);

            if (sortedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-24 text-center text-slate-300 font-bold italic tracking-widest uppercase">ไม่พบข้อมูลอุปกรณ์</td></tr>`;
                updateStats(); return;
            }

            tbody.innerHTML = sortedData.map(d => `
                <tr class="hover:bg-slate-50/80 transition-all ${getDeviceRowStyle(d.type)}">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-4">
                            <div class="w-11 h-11 rounded-2xl flex items-center justify-center bg-white border border-slate-100 shadow-sm text-slate-400">
                                <i class="fa-solid ${getDeviceIcon(d.type)} text-base"></i>
                            </div>
                            <span class="font-bold text-slate-700 tracking-tight">${d.name}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5">
                        <span class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase border tracking-widest ${getBadgeStyle(d.type)}">
                            ${d.type}
                        </span>
                    </td>
                    <td class="px-8 py-5 mono font-bold text-blue-600 text-[13px] tracking-wide">${d.ip || '-'}</td>
                    <td class="px-8 py-5">
                        <span class="px-4 py-1.5 rounded-xl text-[11px] font-black bg-slate-100 text-slate-500 border border-slate-200 uppercase tracking-tighter">
                            ${d.dept}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <div class="flex justify-center gap-2.5">
                            <button onclick="editDevice(${d.id})" class="w-10 h-10 rounded-2xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm flex items-center justify-center group"><i class="fa-solid fa-pencil text-xs transform group-active:scale-90"></i></button>
                            <button onclick="deleteDevice(${d.id})" class="w-10 h-10 rounded-2xl bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white transition-all shadow-sm flex items-center justify-center group"><i class="fa-solid fa-minus text-xs transform group-active:scale-90"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            updateStats();
        }

        function renderIpMap() {
            const container = document.getElementById('ipGridContainer');
            let html = '';
            let used = 0;
            
            // เรียงลำดับ 1-255 อยู่แล้วตาม Loop
            for(let i = 1; i <= 255; i++) {
                const ipStr = `192.168.10.${i}`;
                const device = devices.find(d => d.ip === ipStr);
                
                if(device) {
                    used++;
                    html += `
                        <div onclick="editDevice(${device.id})" class="p-3 rounded-2xl border border-slate-200 ${getBadgeStyle(device.type)} cursor-pointer text-center shadow-sm hover:scale-110 hover:shadow-md transition-all relative group">
                            <div class="text-[9px] font-black opacity-40 mb-1 leading-none">.${i}</div>
                            <i class="fa-solid ${getDeviceIcon(device.type)} text-xs"></i>
                            <div class="text-[7px] font-black truncate mt-1 leading-none">${device.name}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div onclick="addWithIp('${ipStr}')" class="p-3 rounded-2xl bg-slate-50 border border-dashed border-slate-300 text-slate-300 hover:border-slate-400 hover:text-slate-500 cursor-pointer text-center group transition-all">
                            <div class="text-[9px] font-black opacity-30 mb-1 leading-none">.${i}</div>
                            <i class="fa-solid fa-plus opacity-0 group-hover:opacity-100 text-xs"></i>
                            <div class="text-[7px] font-bold mt-1 uppercase tracking-tighter leading-none">ว่าง</div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            updateStats(used);
        }

        // --- 5. ตรรกะระบบควบคุม ---
        function setFilter(type, value) {
            if(type === 'dept') currentDept = value;
            else currentTypeFilter = value;
            
            viewMode = 'table';
            document.getElementById('tableView').classList.remove('hidden');
            document.getElementById('ipMapView').classList.add('hidden');
            renderFilters();
            filterDevices();
        }

        function toggleIpView() {
            viewMode = 'ipmap';
            document.getElementById('tableView').classList.add('hidden');
            document.getElementById('ipMapView').classList.remove('hidden');
            renderIpMap();
        }

        function filterDevices() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = devices.filter(d => {
                const matchDept = (currentDept === 'ทั้งหมด' || d.dept === currentDept);
                const matchType = (currentTypeFilter === 'ทั้งหมด' || d.type === currentTypeFilter);
                const matchQuery = (d.name.toLowerCase().includes(q) || (d.ip && d.ip.toLowerCase().includes(q)));
                return matchDept && matchType && matchQuery;
            });
            renderTable(filtered);
        }

        function updateStats(usedCount = null) {
            const used = usedCount !== null ? usedCount : devices.filter(d => d.ip && d.ip.startsWith('192.168.10.')).length;
            document.getElementById('usedCount').innerText = used;
            document.getElementById('unusedCount').innerText = 255 - used;
        }

        function openModal(id = null) {
            const m = document.getElementById('deviceModal');
            document.getElementById('deviceForm').reset();
            document.getElementById('deviceId').value = '';
            document.getElementById('modalTitle').innerText = 'ลงทะเบียนอุปกรณ์ใหม่';
            
            if(id) {
                const d = devices.find(x => x.id === id);
                document.getElementById('deviceId').value = d.id;
                document.getElementById('deviceName').value = d.name;
                document.getElementById('deviceType').value = d.type;
                document.getElementById('deviceIp').value = d.ip || '';
                document.getElementById('deviceDept').value = d.dept;
                document.getElementById('modalTitle').innerText = 'แก้ไขรายละเอียดอุปกรณ์';
            }
            m.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() { document.getElementById('deviceModal').classList.add('hidden'); document.body.classList.remove('modal-active'); }

        function handleSave(event) {
            event.preventDefault();
            const id = document.getElementById('deviceId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('deviceName').value,
                type: document.getElementById('deviceType').value,
                ip: document.getElementById('deviceIp').value,
                dept: document.getElementById('deviceDept').value
            };
            if(id) { const idx = devices.findIndex(x => x.id === parseInt(id)); devices[idx] = data; }
            else { devices.push(data); }
            closeModal();
            renderFilters();
            if(viewMode === 'ipmap') renderIpMap(); else filterDevices();
        }

        function addWithIp(ip) { openModal(); document.getElementById('deviceIp').value = ip; }
        function editDevice(id) { openModal(id); }
        function deleteDevice(id) { if(confirm('⚠️ ยืนยันการลบข้อมูลอุปกรณ์นี้ออกจากระบบ?')) { devices = devices.filter(x => x.id !== id); renderFilters(); if(viewMode === 'ipmap') renderIpMap(); else filterDevices(); } }

        window.onload = () => { renderFilters(); renderTable(devices); };
    </script>
</body>
</html>
