<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเครือข่าย ศสส.บก.ควบคุม 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <nav class="bg-blue-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-network-wired text-2xl mr-3"></i>
                    <span class="font-semibold text-xl tracking-tight">ระบบฐานข้อมูลอินเตอร์เน็ต ศสส.บก.ควบคุม 2</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-semibold text-gray-800">รายการอุปกรณ์ในเครือข่าย</h1>
            <div class="flex gap-2 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-solid fa-search text-gray-400"></i>
                    </span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ค้นหาชื่อ, IP, แผนก..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <button onclick="openModal()" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg flex items-center transition-colors shrink-0">
                    <i class="fa-solid fa-plus mr-2"></i> เพิ่มอุปกรณ์
                </button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ชื่ออุปกรณ์</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ประเภท</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">IP Address / ข้อมูลอ้างอิง</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">หน่วยงาน/แผนก</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="deviceTableBody" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="deviceModal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex justify-center items-center">
        <div class="bg-white rounded-lg shadow-xl w-11/12 md:w-1/2 max-w-lg mx-auto">
            <div class="flex justify-between items-center px-6 py-4 border-b">
                <h3 class="text-lg font-semibold text-gray-900" id="modalTitle">เพิ่มอุปกรณ์ใหม่</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <form id="deviceForm" onsubmit="saveDevice(event)" class="px-6 py-4 space-y-4">
                <input type="hidden" id="deviceId">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่ออุปกรณ์</label>
                    <input type="text" id="deviceName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="เช่น เครื่องพิมพ์ ฝขว., Router Army05">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ประเภทอุปกรณ์</label>
                    <select id="deviceType" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="PC">คอมพิวเตอร์ (PC)</option>
                        <option value="Notebook">โน้ตบุ๊ก (Notebook)</option>
                        <option value="Server">เซิร์ฟเวอร์ (Server)</option>
                        <option value="Router">เราเตอร์ (Router/Wi-Fi)</option>
                        <option value="Switch">สวิตช์ฮับ (Switch/Hub)</option>
                        <option value="Printer">เครื่องพิมพ์ (Printer)</option>
                        <option value="Fax">แฟกซ์ (Fax)</option>
                        <option value="Other">อื่นๆ</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">IP Address / หมายเลขอ้างอิง</label>
                    <input type="text" id="deviceIp" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="เช่น 192.168.10.50 หรือ 042219604">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">หน่วยงาน / แผนก</label>
                    <input type="text" id="deviceDept" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="เช่น ฝขว., ฝยก., ศสส., ส่วนกลาง">
                </div>

                <div class="pt-4 flex justify-end gap-2 border-t mt-6">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300 transition-colors">ยกเลิก</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ข้อมูลเริ่มต้นดึงมาจากเอกสาร ศสส. บก.ควบคุม 2
        let devices = [
            { id: 1, name: 'Firewall/Server อินเตอร์เน็ต', type: 'Server', ip: '192.168.10.1', dept: 'ส่วนกลาง' },
            { id: 2, name: 'Server ศสส.', type: 'Server', ip: '192.168.10.50', dept: 'ศสส.' },
            { id: 3, name: 'Router Army02', type: 'Router', ip: '192.168.20.1', dept: 'ส่วนกลาง' },
            { id: 4, name: 'Router Army03', type: 'Router', ip: '192.168.21.1', dept: 'ส่วนกลาง' },
            { id: 5, name: 'Router Army04', type: 'Router', ip: '192.168.22.1', dept: 'ส่วนกลาง' },
            { id: 6, name: 'คอมพิวเตอร์ ฝขว.', type: 'PC', ip: '192.168.10.76', dept: 'ฝขว.' },
            { id: 7, name: 'คอมพิวเตอร์ ฝยก.', type: 'PC', ip: '192.168.10.102', dept: 'ฝยก.' },
            { id: 8, name: 'Server ฝยก.', type: 'Server', ip: '192.168.10.100', dept: 'ฝยก.' },
            { id: 9, name: 'Fax ศสส.', type: 'Fax', ip: '042219604', dept: 'ศสส.' },
            { id: 10, name: 'Router ห้องประชุม', type: 'Router', ip: '192.168.24.1', dept: 'ห้องประชุม' },
            { id: 11, name: 'Switch Hub หลัก', type: 'Switch', ip: '-', dept: 'ส่วนกลาง' }
        ];

        let editMode = false;

        // ฟังก์ชันช่วยกำหนดสีป้ายกำกับ (Badge) ตามประเภทอุปกรณ์
        function getTypeStyle(type) {
            const styles = {
                'Server': 'bg-red-100 text-red-800',
                'Router': 'bg-blue-100 text-blue-800',
                'Switch': 'bg-indigo-100 text-indigo-800',
                'PC': 'bg-gray-100 text-gray-800',
                'Notebook': 'bg-purple-100 text-purple-800',
                'Printer': 'bg-yellow-100 text-yellow-800',
                'Fax': 'bg-orange-100 text-orange-800',
                'Other': 'bg-green-100 text-green-800'
            };
            return styles[type] || styles['Other'];
        }

        // ฟังก์ชันช่วยกำหนดไอคอนตามประเภทอุปกรณ์
        function getTypeIcon(type) {
            const icons = {
                'Server': 'fa-server',
                'Router': 'fa-wifi',
                'Switch': 'fa-network-wired',
                'PC': 'fa-desktop',
                'Notebook': 'fa-laptop',
                'Printer': 'fa-print',
                'Fax': 'fa-fax',
                'Other': 'fa-microchip'
            };
            return icons[type] || 'fa-microchip';
        }

        // แสดงผลตาราง
        function renderTable(data = devices) {
            const tbody = document.getElementById('deviceTableBody');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">ไม่พบข้อมูลอุปกรณ์</td></tr>';
                return;
            }

            data.forEach(device => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors';
                
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-10 w-10 flex items-center justify-center rounded-full bg-gray-100 text-gray-600">
                                <i class="fa-solid ${getTypeIcon(device.type)}"></i>
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${device.name}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getTypeStyle(device.type)}">
                            ${device.type}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono">
                        ${device.ip || '-'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${device.dept}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="editDevice(${device.id})" class="text-indigo-600 hover:text-indigo-900 mr-3" title="แก้ไข">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button onclick="deleteDevice(${device.id})" class="text-red-600 hover:text-red-900" title="ลบ">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ระบบค้นหา
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = devices.filter(d => 
                d.name.toLowerCase().includes(searchTerm) || 
                d.ip.toLowerCase().includes(searchTerm) || 
                d.dept.toLowerCase().includes(searchTerm) ||
                d.type.toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        }

        // เปิด Modal
        function openModal(id = null) {
            const modal = document.getElementById('deviceModal');
            const form = document.getElementById('deviceForm');
            const title = document.getElementById('modalTitle');
            
            form.reset();
            document.body.classList.add('modal-active');
            modal.classList.remove('hidden');

            if (id) {
                editMode = true;
                title.innerText = 'แก้ไขข้อมูลอุปกรณ์';
                const device = devices.find(d => d.id === id);
                document.getElementById('deviceId').value = device.id;
                document.getElementById('deviceName').value = device.name;
                document.getElementById('deviceType').value = device.type;
                document.getElementById('deviceIp').value = device.ip;
                document.getElementById('deviceDept').value = device.dept;
            } else {
                editMode = false;
                title.innerText = 'เพิ่มอุปกรณ์ใหม่';
                document.getElementById('deviceId').value = '';
            }
        }

        // ปิด Modal
        function closeModal() {
            const modal = document.getElementById('deviceModal');
            modal.classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        // บันทึกข้อมูล (เพิ่ม/แก้ไข)
        function saveDevice(e) {
            e.preventDefault();
            
            const id = document.getElementById('deviceId').value;
            const name = document.getElementById('deviceName').value;
            const type = document.getElementById('deviceType').value;
            const ip = document.getElementById('deviceIp').value;
            const dept = document.getElementById('deviceDept').value;

            if (editMode && id) {
                // อัพเดท
                const index = devices.findIndex(d => d.id == id);
                if (index !== -1) {
                    devices[index] = { id: parseInt(id), name, type, ip, dept };
                }
            } else {
                // สร้างใหม่
                const newId = devices.length > 0 ? Math.max(...devices.map(d => d.id)) + 1 : 1;
                devices.push({ id: newId, name, type, ip, dept });
            }

            closeModal();
            filterTable(); // เพื่อให้ตารางรีเฟรชและยังคงค่าการค้นหาไว้
        }

        // ลบข้อมูล
        function deleteDevice(id) {
            if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบอุปกรณ์นี้?')) {
                devices = devices.filter(d => d.id !== id);
                filterTable();
            }
        }

        // โหลดข้อมูลครั้งแรก
        window.onload = () => {
            renderTable();
        };
    </script>
</body>
</html>
