        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('devices');

        // --- 2. ข้อมูลและสถานะตั้งต้น ---
        let devices = [];
        let currentDept = 'ทั้งหมด';
        let currentTypeFilter = 'ทั้งหมด';
        let viewMode = 'table';

        const depts = ['ทั้งหมด', 'ส่วนกลาง', 'ศสส.', 'ชกส.', 'ฝขว.', 'ฝยก.', '250', 'ปจว.', 'ฝกร.', 'ฝยส.', 'ศสน.'];
        const types = ['ทั้งหมด', 'Server', 'PC', 'Notebook', 'Fax', 'Printer', 'Mobile', 'iPad', 'Router', 'Switch'];

        // --- 3. ฟังก์ชันตัวช่วยสไตล์และการจัดเรียงไอพี ---
        function parseIP(ip) {
            if (!ip || ip === '-') return [999, 999, 999, 999];
            let parts = ip.split('.').map(Number);
            return parts.length === 4 ? parts : [999, 999, 999, 999];
        }

        function sortDevicesByIP(list) {
            return list.sort((a, b) => {
                const ipA = parseIP(a.ip);
                const ipB = parseIP(b.ip);
                for (let i = 0; i < 4; i++) {
                    if (ipA[i] !== ipB[i]) return ipA[i] - ipB[i];
                }
                return 0;
            });
        }

        function getDeviceTypeClass(type) {
            switch(type) {
                case 'Server': return 'device-server';
                case 'PC': return 'device-pc';
                case 'Notebook': return 'device-notebook';
                case 'Fax': return 'device-fax';
                case 'Router': return 'device-router';
                case 'Printer': return 'device-printer';
                default: return 'device-default';
            }
        }

        function getBadgeStyle(type) {
            switch(type) {
                case 'Server': return 'badge-red';
                case 'PC': return 'badge-blue';
                case 'Notebook': return 'badge-cyan';
                case 'Fax': return 'badge-yellow';
                case 'Router': return 'badge-purple';
                case 'Printer': return 'badge-brown';
                default: return 'badge-gray';
            }
        }

        function getDeviceIcon(type) {
            const icons = {
                'PC': 'fa-desktop', 'Notebook': 'fa-laptop', 'Printer': 'fa-print',
                'Mobile': 'fa-mobile-screen', 'iPad': 'fa-tablet-screen-button',
                'Server': 'fa-server', 'Router': 'fa-wifi', 'Switch': 'fa-network-wired',
                'Fax': 'fa-fax'
            };
            return icons[type] || 'fa-microchip';
        }

        function getDeviceIconColor(type) {
            const colors = {
                'Server': '#ef4444', 'PC': '#3b82f6', 'Notebook': '#80cbc4',
                'Fax': '#eab308', 'Router': '#ce93d8', 'Printer': '#bcaaa4',
                'Mobile': '#94a3b8', 'iPad': '#94a3b8', 'Switch': '#94a3b8', 'Other': '#94a3b8'
            };
            return colors[type] || '#94a3b8';
        }

        function getDeviceIconBgColor(type) {
            const colors = {
                'Server': '#ffebee', 'PC': '#e3f2fd', 'Notebook': '#e0f2f1',
                'Fax': '#fff3e0', 'Router': '#f3e5f5', 'Printer': '#efebe9',
                'Mobile': '#f5f5f5', 'iPad': '#f5f5f5', 'Switch': '#f5f5f5', 'Other': '#f5f5f5'
            };
            return colors[type] || '#f5f5f5';
        }

        // --- 4. การเรนเดอร์ UI ส่วนต่างๆ ---
        function renderFilters() {
            const
