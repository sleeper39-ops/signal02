<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบฐานข้อมูลเครือข่าย ศสส.บก.ควบคุม 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <nav class="bg-gradient-to-r from-blue-900 to-indigo-800 text-white shadow-xl sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="bg-white/10 p-2 rounded-lg">
                        <i class="fa-solid fa-network-wired text-xl text-blue-300"></i>
                    </div>
                    <div>
                        <span class="font-bold text-lg block tracking-wide">ระบบฐานข้อมูลอินเตอร์เน็ต</span>
                        <span class="text-xs text-blue-200 block -mt-1">ศสส.บก.ควบคุม 2</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-slate-500 mb-2 uppercase tracking-wider">จัดหมวดหมู่ตามฝ่าย / หน่วยงาน</label>
            <div class="flex flex-wrap gap-2" id="deptTabsContainer">
                </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="relative w-full md:w-80">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                </span>
                <input type="text" id="searchInput" onkeyup="filterDevices()" placeholder="ค้นหาชื่ออุปกรณ์, IP Address..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm transition-all">
            </div>
            <button onclick="openModal()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-5 rounded-xl flex items-center justify-center gap-2 shadow-md shadow-blue-500/20 transition-all transform active:scale-95">
                <i class="fa-solid fa-plus text-sm"></i> เพิ่มอุปกรณ์เครือข่าย
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-100">
                    <thead class="bg-slate-50/70">
                        <tr>
                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">ชื่ออุปกรณ์</th>
                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">ประเภท</th>
                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">IP Address / หมายเลข</th>
                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">ฝ่ายที่รับผิดชอบ</th>
                            <th class="px-6 py-3.5 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="deviceTableBody" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="deviceModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100 bg-slate-50">
                <h3 class="text-base font-semibold text-slate-900" id="modalTitle">เพิ่มอุปกรณ์เครือข่าย</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-200/50 transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <form id="deviceForm" onsubmit="handleFormSubmit(event)" class="px-6 py-5 space-y-4">
                <input type="hidden" id="deviceId">
                
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">ชื่ออุปกรณ์</label>
                    <input type="text" id="deviceName" required class="w-full px-3.5 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" placeholder="ระบุชื่ออุปกรณ์ เช่น PC ฝขว. เครื่องที่ 1">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">ประเภทอุปกรณ์</label>
                    <select id="deviceType" required class="w-full px-3.5 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-white">
                        <option value="PC">คอมพิวเตอร์ (PC)</option>
                        <option value="Notebook">โน้ตบุ๊ก (Notebook)</option>
                        <option value="Server">เซิร์ฟเวอร์ (Server)</option>
                        <option value="Router">เราเตอร์ (Router / Wi-Fi)</option>
                        <option value="Switch">สวิตช์ฮับ (Switch / Hub)</option>
                        <option value="Fax">แฟกซ์ (Fax)</option>
                        <option value="Other">อุปกรณ์อื่นๆ</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">IP Address / หมายเลขเชื่อมต่อ</label>
                    <input type="text" id="deviceIp" class="w-full px-3.5 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 font-mono" placeholder="เช่น 192.168.10.x หรือ หมายเลขสายด่วน">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">ฝ่าย / หน่วยงานเจ้าของเครื่อง</label>
                    <select id="deviceDept" required class="w-full px-3.5 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-white">
                        <option value="ส่วนกลาง">ส่วนกลาง / ระบบหลัก</option>
                        <option value="ศสส.">ศสส.</option>
                        <option value="ฝขว.">ฝขว.</option>
                        <option value="ฝยก.">ฝยก.</option>
                        <option value="หน่วย 250">หน่วย 250</option>
                        <option value="ปจว./ฝปส.">ปจว./ฝปส.</option>
                        <option value="ฝยส.">ฝยส.</option>
                        <option value="ศสน.">ศสน.</option>
                    </select>
                </div>

                <div class="pt-4 flex justify-end gap-2 border-t border-slate-100">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-medium bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition-colors">ยกเลิก</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors shadow-md shadow-blue-500/10">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ชุดข้อมูลหลักที่ดึงมาจากโครงสร้างระบบเครือข่ายอินเตอร์เน็ต ศสส.บก.ควบคุม 2 ทั้งหมด
        let devices = [
            // หมวดหมู่: ส่วนกลาง / ระบบหลัก (Firewall & Gateway หลัก)
            { id: 1, name: 'Firewall / Server อินเตอร์เน็ตหลัก', type: 'Server', ip: '192.168.10.1', dept: 'ส่วนกลาง' },
            { id: 2, name: 'อินเตอร์เน็ตสำนักงานหลัก (TOT สีขาว)', type: 'Router', ip: '192.168.0.1', dept: 'ส่วนกลาง' },
            { id: 3, name: 'อินเตอร์เน็ตใช้งานทั่วไป (TOT สีขาว)', type: 'Router', ip: '192.168.1.1', dept: 'ส่วนกลาง' },
            { id: 4, name: 'Router Gateway Army02', type: 'Router', ip: '192.168.20.1', dept: 'ส่วนกลาง' },
            { id: 5, name: 'Router Gateway Army03', type: 'Router', ip: '192.168.21.1', dept: 'ส่วนกลาง' },
            { id: 6, name: 'Router Gateway Army04', type: 'Router', ip: '192.168.22.1', dept: 'ส่วนกลาง' },
            { id: 7, name: 'Router Gateway Army05', type: 'Router', ip: '192.168.23.1', dept: 'ส่วนกลาง' },
            { id: 8, name: 'Router ประจำห้องประชุม บก.', type: 'Router', ip: '192.168.24.1', dept: 'ส่วนกลาง' },
            { id: 9, name: 'Switch Hub ประจำสำนักงานหลัก', type: 'Switch', ip: '-', dept: 'ส่วนกลาง' },

            // หมวดหมู่: ฝ่าย ศสส. (IP: 192.168.10.50 - 55)
            { id: 10, name: 'เซิร์ฟเวอร์หลัก ศสส. (Server)', type: 'Server', ip: '192.168.10.50', dept: 'ศสส.' },
            { id: 11, name: 'คอมพิวเตอร์ประจำฝ่าย ศสส. (เครื่องหลัก)', type: 'PC', ip: '192.168.10.51', dept: 'ศสส.' },
            { id: 12, name: 'เครื่องโทรสาร / แฟกซ์ (Fax 042219604)', type: 'Fax', ip: '042219604', dept: 'ศสส.' },
            { id: 13, name: 'Notebook ส่วนตัว เจ้าหน้าที่ ศสส.', type: 'Notebook', ip: '-', dept: 'ศสส.' },

            { id: 14, name: 'คอมพิวเตอร์ประจำฝ่าย ฝขว. (PC Client)', type: 'PC', ip: '192.168.10.76', dept: 'ฝขว.' },
            { id: 15, name: 'เซิร์ฟเวอร์ย่อยประจำฝ่าย ฝขว. (Server)', type: 'Server', ip: '192.168.10.65', dept: 'ฝขว.' },
            { id: 16, name: 'PC ฝขว. (จุดเชื่อมต่อที่ 1)', type: 'PC', ip: '192.168.10.60', dept: 'ฝขว.' },
            { id: 17, name: 'PC ฝขว. (จุดเชื่อมต่อที่ 2)', type: 'PC', ip: '192.168.10.62', dept: 'ฝขว.' },
            { id: 18, name: 'PC ฝขว. (จุดเชื่อมต่อที่ 3)', type: 'PC', ip: '192.168.10.66', dept: 'ฝขว.' },
            { id: 19, name: 'Notebook ประจำตัว เจ้าหน้าที่ ฝขว.', type: 'Notebook', ip: '192.168.10.64', dept: 'ฝขว.' },

            // หมวดหมู่: ฝ่าย ฝยก. (IP Range: 192.168.10.100 - 110)
            { id: 20, name: 'เซิร์ฟเวอร์หลักประจำฝ่าย ฝยก. (Server)', type: 'Server', ip: '192.168.10.100', dept: 'ฝยก.' },
            { id: 21, name: 'PC ประจำฝ่าย ฝยก. เครื่องที่ 1', type: 'PC', ip: '192.168.10.101', dept: 'ฝยก.' },
            { id: 22, name: 'PC ประจำฝ่าย ฝยก. เครื่องที่ 2', type: 'PC', ip: '192.168.10.102', dept: 'ฝยก.' },
            { id: 23, name: 'PC ประจำฝ่าย ฝยก. เครื่องที่ 3', type: 'PC', ip: '192.168.10.107', dept: 'ฝยก.' },
            { id: 24, name: 'Notebook สำนักงาน ฝยก.', type: 'Notebook', ip: '-', dept: 'ฝยก.' },

            // หมวดหมู่: หน่วย 250. (IP Range: 192.168.10.111 - 119)
            { id: 25, name: 'PC ประจำหน่วย 250. เครื่องหลัก', type: 'PC', ip: '192.168.10.116', dept: 'หน่วย 250' },
            { id: 26, name: 'PC ประจำหน่วย 250. เครื่องที่ 2', type: 'PC', ip: '192.168.10.115', dept: 'หน่วย 250' },
            { id: 27, name: 'PC ประจำหน่วย 250. เครื่องที่ 3', type: 'PC', ip: '192.168.10.112', dept: 'หน่วย 250' },
            { id: 28, name: 'Notebook ส่วนตัว เจ้าหน้าที่ หน่วย 250', type: 'Notebook', ip: '-', dept: 'หน่วย 250' },

            // หมวดหมู่: ฝ่าย ปจว./ฝปส. (IP Range: 192.168.10.120 - 129)
            { id: 29, name: 'PC ประจำฝ่าย ปจว./ฝปส. เครื่องที่ 1', type: 'PC', ip: '192.168.10.121', dept: 'ปจว./ฝปส.' },
            { id: 30, name: 'PC ประจำฝ่าย ปจว./ฝปส. เครื่องที่ 2', type: 'PC', ip: '192.168.10.122', dept: 'ปจว./ฝปส.' },
            { id: 31, name: 'PC ประจำฝ่าย ปจว./ฝปส. เครื่องที่ 3', type: 'PC', ip: '192.168.10.123', dept: 'ปจว./ฝปส.' },
            { id: 32, name: 'Notebook ส่วนตัว เจ้าหน้าที่ ปจว.', type: 'Notebook', ip: '192.168.10.126', dept: 'ปจว./ฝปส.' },

            // หมวดหมู่: ฝ่าย ฝยส. (IP Range: 192.168.10.130 - 139)
            { id: 33, name: 'PC ประจำฝ่าย ฝยส. เครื่องหลัก', type: 'PC', ip: '192.168.10.131', dept: 'ฝยส.' },
            { id: 34, name: 'เซิร์ฟเวอร์ประจำฝ่าย ฝยส. (Server)', type: 'Server', ip: '192.168.10.132', dept: 'ฝยส.' },
            { id: 35, name: 'PC ประจำฝ่าย ฝยส. เครื่องที่ 2', type: 'PC', ip: '192.168.10.133', dept: 'ฝยส.' },

            // หมวดหมู่: ฝ่าย ศสน. (IP Range: 192.168.10.140 - 155)
            { id: 36, name: 'PC ประจำฝ่าย ศสน. เครื่องหลัก', type: 'PC', ip: '192.168.10.142', dept: 'ศสน.' },
            { id: 37, name: 'เซิร์ฟเวอร์ประจำฝ่าย ศสน. (Server)', type: 'Server', ip: '192.168.10.143', dept: 'ศสน.' },
            { id: 38, name: 'PC ประจำฝ่าย ศสน. เครื่องที่ 2', type: 'PC', ip: '192.168.10.152', dept: 'ศสน.' },
            { id: 39, name: 'PC ประจำฝ่าย ศสน. เครื่องที่ 3', type: 'PC', ip: '192.168.10.153', dept: 'ศสน.' },
            { id: 40, name: 'Notebook ส่วนตัว เจ้าหน้าที่ ศสน.', type: 'Notebook', ip: '-', dept: 'ศสน.' }
        ];

        let currentSelectedDept = 'ทั้งหมด';
        let isEditMode = false;

        // รายชื่อฝ่ายทั้งหมดสอดคล้องตามโครงสร้างองค์กรในไฟล์นำเสนอ
        const departmentsList = ['ทั้งหมด', 'ส่วนกลาง', 'ศสส.', 'ฝขว.', 'ฝยก.', 'หน่วย 250', 'ปจว./ฝปส.', 'ฝยส.', 'ศสน.'];

        // ฟังก์ชันกำหนดสีสำหรับ Badge ของแต่ละประเภทอุปกรณ์
        function getBadgeColor(type) {
            const colors = {
                'Server': 'bg-rose-50 text-rose-700 border-rose-100',
                'Router': 'bg-sky-50 text-sky-700 border-sky-100',
                'Switch': 'bg-violet-50 text-violet-700 border-violet-100',
                'PC': 'bg-slate-100 text-slate-700 border-slate-200',
                'Notebook': 'bg-purple-50 text-purple-700 border-purple-100',
                'Fax': 'bg-amber-50 text-amber-700 border-amber-100'
            };
            return colors[type] || 'bg-emerald-50 text-emerald-700 border-emerald-100';
        }

        // ฟังก์ชันเลือกไอคอนที่เหมาะสมกับชนิดอุปกรณ์
        function getDeviceIcon(type) {
            const icons = {
                'Server': 'fa-server text-rose-500',
                'Router': 'fa-wifi text-sky-500',
                'Switch': 'fa-network-wired text-violet-500',
                'PC': 'fa-desktop text-slate-500',
                'Notebook': 'fa-laptop text-purple-500',
                'Fax': 'fa-fax text-amber-500'
            };
            return icons[type] || 'fa-microchip text-emerald-500';
        }

        // สร้างแท็บสำหรับจัดหมวดหมู่อุปกรณ์ของแต่ละฝ่าย
        function renderDepartmentTabs() {
            const container = document.getElementById('deptTabsContainer');
            container.innerHTML = '';
            
            departmentsList.forEach(dept => {
                const count = dept === 'ทั้งหมด' ? devices.length : devices.filter(d => d.dept === dept).length;
                const button = document.createElement('button');
                
                if (currentSelectedDept === dept) {
                    button.className = "px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-xl shadow-sm transition-all";
                } else {
                    button.className = "px-4 py-2 text-sm font-medium bg-white text-slate-600 border border-slate-200 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-all";
                }
                
                button.innerHTML = `${dept} <span class="ml-1 text-xs opacity-70 bg-black/10 px-1.5 py-0.5 rounded-md">${count}</span>`;
                button.onclick = () => selectDepartment(dept);
                container.appendChild(button);
            });
        }

        function selectDepartment(dept) {
            currentSelectedDept = dept;
            renderDepartmentTabs();
            filterDevices();
        }

        // แสดงผลรายการข้อมูลลงในตารางหลัก
        function renderDeviceTable(dataToDisplay = devices) {
            const tbody = document.getElementById('deviceTableBody');
            tbody.innerHTML = '';
            
            if (dataToDisplay.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-sm text-slate-400 font-light"><i class="fa-solid fa-folder-open text-lg block mb-1"></i>ไม่มีอุปกรณ์ที่ลงทะเบียนในหมวดหมู่นี้</td></tr>`;
                return;
            }

            dataToDisplay.forEach(device => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/50 transition-colors';
                
                tr.innerHTML = `
                    <td class="px-6 py-3.5 whitespace-nowrap">
                        <div class="flex items-center gap-3">
                            <div class="h-9 w-9 flex items-center justify-center rounded-xl bg-slate-50 border border-slate-100 shadow-sm text-sm">
                                <i class="fa-solid ${getDeviceIcon(device.type)}"></i>
                            </div>
                            <span class="text-sm font-medium text-slate-900">${device.name}</span>
                        </div>
                    </td>
                    <td class="px-6 py-3.5 whitespace-nowrap">
                        <span class="px-2.5 py-1 inline-flex text-xs font-semibold rounded-lg border ${getBadgeColor(device.type)}">
                            ${device.type}
                        </span>
                    </td>
                    <td class="px-6 py-3.5 whitespace-nowrap text-sm font-mono text-slate-500">
                        ${device.ip || '-'}
                    </td>
                    <td class="px-6 py-3.5 whitespace-nowrap text-sm text-slate-600 font-medium">
                        <span class="bg-slate-100 text-slate-700 px-2 py-1 rounded-md text-xs"><i class="fa-solid fa-building text-[10px] mr-1 text-slate-400"></i>${device.dept}</span>
                    </td>
                    <td class="px-6 py-3.5 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="editDeviceDetails(${device.id})" class="text-blue-600 hover:text-blue-800 p-1 rounded-lg hover:bg-blue-50 transition-all mr-2" title="แก้ไข">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button onclick="deleteDeviceRecord(${device.id})" class="text-rose-600 hover:text-rose-800 p-1 rounded-lg hover:bg-rose-50 transition-all" title="ลบข้อมูล">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ฟังก์ชันประมวลผลการค้นหา และการกรองตามฝ่ายพร้อมกัน
        function filterDevices() {
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredData = devices.filter(device => {
                const matchesDept = (currentSelectedDept === 'ทั้งหมด' || device.dept === currentSelectedDept);
                const matchesSearch = (
                    device.name.toLowerCase().includes(searchKeyword) || 
                    device.ip.toLowerCase().includes(searchKeyword) ||
                    device.type.toLowerCase().includes(searchKeyword)
                );
                return matchesDept && matchesSearch;
            });
            
            renderDeviceTable(filteredData);
        }

        // ควบคุมการเปิดปิดหน้าต่างแจ้งเตือนฟอร์ม (Modal Form)
        function openModal(id = null) {
            const modal = document.getElementById('deviceModal');
            const form = document.getElementById('deviceForm');
            const title = document.getElementById('modalTitle');
            
            form.reset();
            document.body.classList.add('modal-active');
            modal.classList.remove('hidden');

            if (id) {
                isEditMode = true;
                title.innerText = 'แก้ไขรายละเอียดข้อมูลอุปกรณ์';
                const targetDevice = devices.find(d => d.id === id);
                document.getElementById('deviceId').value = targetDevice.id;
                document.getElementById('deviceName').value = targetDevice.name;
                document.getElementById('deviceType').value = targetDevice.type;
                document.getElementById('deviceIp').value = targetDevice.ip;
                document.getElementById('deviceDept').value = targetDevice.dept;
            } else {
                isEditMode = false;
                title.innerText = 'เพิ่มอุปกรณ์เครือข่ายใหม่';
                document.getElementById('deviceId').value = '';
                // เลือกค่าเริ่มต้นให้ตรงกับแท็บที่กดอยู่ (ถ้าไม่ใช่ 'ทั้งหมด')
                if (currentSelectedDept !== 'ทั้งหมด') {
                    document.getElementById('deviceDept').value = currentSelectedDept;
                }
            }
        }

        function closeModal() {
            const modal = document.getElementById('deviceModal');
            modal.classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        // จัดการเหตุการณ์เมื่อกดบันทึกข้อมูล (เพิ่มเครื่อง หรือ แก้ไขไอพี)
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('deviceId').value;
            const name = document.getElementById('deviceName').value;
            const type = document.getElementById('deviceType').value;
            const ip = document.getElementById('deviceIp').value;
            const dept = document.getElementById('deviceDept').value;

            if (isEditMode && id) {
                // แก้ไขข้อมูลเก่า
                const index = devices.findIndex(d => d.id == id);
                if (index !== -1) {
                    devices[index] = { id: parseInt(id), name, type, ip, dept };
                }
            } else {
                // เพิ่มข้อมูลชิ้นใหม่
                const nextId = devices.length > 0 ? Math.max(...devices.map(d => d.id)) + 1 : 1;
                devices.push({ id: nextId, name, type, ip, dept });
            }

            closeModal();
            renderDepartmentTabs();
            filterDevices();
        }

        function editDeviceDetails(id) {
            openModal(id);
        }

        function deleteDeviceRecord(id) {
            if (confirm('คุณต้องการนำอุปกรณ์ไอพีชิ้นนี้ออกจากระบบฐานข้อมูลเครือข่ายหรือไม่?')) {
                devices = devices.filter(d => d.id !== id);
                renderDepartmentTabs();
                filterDevices();
            }
        }

        // สั่งงานระบบเริ่มต้นเมื่อเปิดเว็บบราวเซอร์ขึ้นมาครั้งแรก
        window.onload = () => {
            renderDepartmentTabs();
            renderDeviceTable();
        };
    </script>
</body>
</html>
