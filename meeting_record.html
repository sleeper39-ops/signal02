<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเสียงการประชุม | Communication Dept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Recording UI */
        .recording-pulse {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* Hide Download and More Options button from audio controls */
        audio::-webkit-media-controls-enclosure {
            overflow: hidden;
        }

        audio::-webkit-media-controls-panel {
            width: calc(100% + 50px);
            /* Move more options button further out of view */
        }

        audio::-webkit-media-controls-timeline {
            padding-right: 0px;
        }

        audio::-webkit-media-controls-overflow-button {
            display: none !important;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-[#1e293b] text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html"
                    class="bg-blue-500/20 p-2 rounded-xl border border-blue-500/30 hover:bg-blue-500/40 transition-all">
                    <i class="ph-bold ph-arrow-left text-xl text-blue-400"></i>
                </a>
                <div>
                    <h1 class="font-bold text-lg leading-none text-white">ระบบบันทึกเสียงการประชุม</h1>
                    <span class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">Meeting Recording
                        System</span>
                </div>
            </div>
            <div id="recordingStatusGlobal" class="hidden"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-8 w-full flex-grow space-y-8">

        <!-- Header Actions -->
        <div class="flex justify-between items-center bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
            <div class="flex items-center gap-3">
                <div
                    class="w-12 h-12 rounded-2xl bg-blue-500 text-white flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-microphone-stage text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">ระบบบันทึกเสียงการประชุม</h2>
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Communication Dept</p>
                </div>
            </div>
        </div>

        <!-- Meeting Management Form Card (Static on first page) -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-8 py-5 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-base font-bold text-slate-800 flex items-center gap-2">
                    <i class="ph-bold ph-microphone text-blue-500 text-lg"></i> <span id="formActionText">บันทึกข้อมูลการประชุมใหม่</span>
                </h3>
                <button type="button" id="btnCancelEdit" onclick="resetForm()" class="hidden text-xs font-bold text-red-500 hover:text-red-600 transition-all flex items-center gap-1">
                    <i class="ph-bold ph-x-circle text-sm"></i> ยกเลิกการแก้ไข / เคลียร์แบบฟอร์ม
                </button>
            </div>

            <form id="meetingForm" onsubmit="handleSaveMeeting(event)">
                <div class="p-8 space-y-6">
                    <!-- Recording Section -->
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <div id="recordIconBg" class="w-14 h-14 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-2xl transition-all duration-300 shrink-0">
                                <i id="recordIcon" class="ph-bold ph-microphone"></i>
                            </div>
                            <div class="flex flex-col">
                                <div id="recordStatusLabel" class="text-sm font-bold text-slate-700">เครื่องบันทึกเสียงในเครื่อง (ไมโครโฟน)</div>
                                <div id="recordTimerLabel" class="text-[11px] font-bold text-slate-400">กดปุ่มเริ่มอัดเสียงเพื่อเริ่มจับเสียงประชุมสด</div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 self-end md:self-auto">
                            <!-- Start Button -->
                            <button type="button" id="btnStartRec" onclick="startRecording()"
                                class="bg-red-500 hover:bg-red-600 text-white font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 shadow-lg shadow-red-500/20 transition-all text-xs">
                                <i class="ph-bold ph-circle"></i> เริ่มอัดเสียง
                            </button>
                            <!-- Pause Button -->
                            <button type="button" id="btnPauseRec" onclick="pauseRecording()"
                                class="hidden bg-amber-500 hover:bg-amber-600 text-white font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 shadow-lg shadow-amber-500/20 transition-all text-xs">
                                <i class="ph-bold ph-pause"></i> พัก
                            </button>
                            <!-- Resume Button -->
                            <button type="button" id="btnResumeRec" onclick="resumeRecording()"
                                class="hidden bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 shadow-lg shadow-emerald-500/20 transition-all text-xs">
                                <i class="ph-bold ph-play"></i> เล่นต่อ
                            </button>
                            <!-- Stop Button -->
                            <button type="button" id="btnStopRec" onclick="stopRecording()"
                                class="bg-slate-500 text-white font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 transition-all text-xs disabled:opacity-50 disabled:cursor-not-allowed"
                                disabled>
                                <i class="ph-bold ph-stop"></i> หยุด
                            </button>
                        </div>
                    </div>

                    <!-- Input Fields -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block font-black text-slate-400 mb-2 uppercase text-[10px] tracking-widest pl-1">หัวข้อ / ชื่อการประชุม *</label>
                            <input type="text" id="subject" required
                                class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold"
                                placeholder="ระบุหัวข้อการประชุม">
                        </div>
                        <div>
                            <label class="block font-black text-slate-400 mb-2 uppercase text-[10px] tracking-widest pl-1">วันที่ประชุม *</label>
                            <input type="date" id="meetingDate" required
                                class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold">
                        </div>
                    </div>


                    <input type="hidden" id="audioData">

                    <!-- Actions -->
                    <div class="flex justify-end gap-4 border-t border-slate-100 pt-6">
                        <button type="button" onclick="resetForm()"
                            class="px-8 py-3.5 rounded-2xl font-bold bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all text-sm">เคลียร์แบบฟอร์ม</button>
                        <button type="submit"
                            class="px-8 py-3.5 rounded-2xl font-bold bg-blue-600 text-white hover:bg-blue-700 shadow-xl shadow-blue-500/20 transition-all transform active:scale-95 text-sm tracking-widest">บันทึก</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script>
        const meetingForm = document.getElementById('meetingForm');

        // Recording Logic
        let mediaRecorder;
        let audioChunks = [];
        let startTime;
        let timerInterval;
        let isPaused = false;

        function resetForm() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                stopRecording();
            }
            document.getElementById('meetingForm').reset();
            document.getElementById('audioData').value = '';

            // ตั้งค่าวันที่ปัจจุบันเป็นค่าเริ่มต้น
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('meetingDate').value = today;

            resetRecordingUI();
        }

        function resetRecordingUI() {
            document.getElementById('recordIconBg').className = "w-14 h-14 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-2xl transition-all duration-300 shrink-0";
            document.getElementById('recordIcon').className = "ph-bold ph-microphone";
            document.getElementById('recordStatusLabel').innerText = "เครื่องบันทึกเสียงในเครื่อง (ไมโครโฟน)";
            document.getElementById('recordStatusLabel').className = "text-sm font-bold text-slate-700";
            document.getElementById('recordTimerLabel').innerText = "กดปุ่มเริ่มอัดเสียงเพื่อเริ่มจับเสียงประชุมสด";
            document.getElementById('btnStartRec').classList.remove('hidden');
            document.getElementById('btnPauseRec').classList.add('hidden');
            document.getElementById('btnResumeRec').classList.add('hidden');
            document.getElementById('btnStopRec').disabled = true;
            document.getElementById('btnStopRec').classList.replace('bg-slate-800', 'bg-slate-500');
            document.getElementById('recordingStatusGlobal').classList.add('hidden');
            document.getElementById('recordingStatusGlobal').classList.remove('flex');
            clearInterval(timerInterval);
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        document.getElementById('audioData').value = reader.result;
                    };
                };

                mediaRecorder.start();
                startTime = Date.now();
                isPaused = false;
                updateTimer();
                timerInterval = setInterval(updateTimer, 1000);

                // UI Update for Recording State
                document.getElementById('recordIconBg').className = "w-14 h-14 rounded-full bg-red-500 text-white flex items-center justify-center text-2xl shadow-lg shadow-red-500/30 animate-pulse shrink-0";
                document.getElementById('recordIcon').className = "ph-bold ph-microphone";
                document.getElementById('recordStatusLabel').innerText = "🔴 กำลังบันทึกเสียงประชุม...";
                document.getElementById('recordStatusLabel').className = "text-sm font-bold text-red-500";

                document.getElementById('btnStartRec').classList.add('hidden');
                document.getElementById('btnPauseRec').classList.remove('hidden');
                document.getElementById('btnResumeRec').classList.add('hidden');
                document.getElementById('btnStopRec').disabled = false;
                document.getElementById('btnStopRec').classList.replace('bg-slate-500', 'bg-slate-800');

                document.getElementById('recordingStatusGlobal').classList.remove('hidden');
                document.getElementById('recordingStatusGlobal').classList.add('flex');
            } catch (err) {
                alert('ไม่สามารถเข้าถึงไมโครโฟนได้: ' + err.message);
            }
        }

        function pauseRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.pause();
                isPaused = true;
                clearInterval(timerInterval);

                // UI Update for Paused State
                document.getElementById('recordIconBg').className = "w-14 h-14 rounded-full bg-emerald-500 text-white flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/30 shrink-0";
                document.getElementById('recordIcon').className = "ph-bold ph-microphone";
                document.getElementById('recordStatusLabel').innerText = "⏸️ หยุดอัดชั่วคราว (สามารถกดเล่นต่อ หรือกดบันทึกข้อมูลด่วน)";
                document.getElementById('recordStatusLabel').className = "text-sm font-bold text-emerald-600";

                document.getElementById('btnPauseRec').classList.add('hidden');
                document.getElementById('btnResumeRec').classList.remove('hidden');
                
                document.getElementById('recordingStatusGlobal').classList.add('hidden');
                document.getElementById('recordingStatusGlobal').classList.remove('flex');
            }
        }

        function resumeRecording() {
            if (mediaRecorder && mediaRecorder.state === "paused") {
                mediaRecorder.resume();
                isPaused = false;
                // ปรับ startTime เพื่อให้เวลาเดินต่อจากเดิม
                startTime = Date.now() - (parseTimerToSeconds(document.getElementById('recordTimerLabel')) * 1000);
                timerInterval = setInterval(updateTimer, 1000);

                // UI Update back to Recording
                document.getElementById('recordIconBg').className = "w-14 h-14 rounded-full bg-red-500 text-white flex items-center justify-center text-2xl shadow-lg shadow-red-500/30 animate-pulse shrink-0";
                document.getElementById('recordStatusLabel').innerText = "🔴 กำลังบันทึกเสียงประชุมต่อ...";
                document.getElementById('recordStatusLabel').className = "text-sm font-bold text-red-500";

                document.getElementById('btnPauseRec').classList.remove('hidden');
                document.getElementById('btnResumeRec').classList.add('hidden');

                document.getElementById('recordingStatusGlobal').classList.remove('hidden');
                document.getElementById('recordingStatusGlobal').classList.add('flex');
            }
        }

        function stopRecording() {
            if (mediaRecorder && (mediaRecorder.state === "recording" || mediaRecorder.state === "paused")) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                clearInterval(timerInterval);

                document.getElementById('recordStatusLabel').innerText = "✅ บันทึกเสียงเรียบร้อย (พร้อมบันทึกข้อมูล)";
                document.getElementById('recordStatusLabel').className = "text-sm font-bold text-blue-600";
                document.getElementById('recordIconBg').className = "w-14 h-14 rounded-full bg-blue-500 text-white flex items-center justify-center text-2xl shadow-lg shadow-blue-500/30 shrink-0";

                document.getElementById('btnStartRec').classList.remove('hidden');
                document.getElementById('btnPauseRec').classList.add('hidden');
                document.getElementById('btnResumeRec').classList.add('hidden');
                document.getElementById('btnStopRec').disabled = true;
                document.getElementById('btnStopRec').classList.replace('bg-slate-800', 'bg-slate-500');

                document.getElementById('recordingStatusGlobal').classList.add('hidden');
                document.getElementById('recordingStatusGlobal').classList.remove('flex');
            }
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('recordTimerLabel').innerText = `ระยะเวลาอัดเสียง: ${mins}:${secs} นาที`;
        }

        function parseTimerToSeconds(el) {
            const text = el.innerText;
            const match = text.match(/(\d+):(\d+)/);
            if (match) return parseInt(match[1]) * 60 + parseInt(match[2]);
            return 0;
        }

        async function handleSaveMeeting(event) {
            event.preventDefault();

            // ตรวจสอบว่ากำลังอัดเสียงอยู่หรือไม่ (ต้องหยุดก่อนถึงจะบันทึกได้)
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                alert("⚠️ ไม่สามารถบันทึกได้! กรุณากดปุ่ม 'หยุด' เพื่อสิ้นสุดการบันทึกเสียงให้เรียบร้อยก่อนทำการบันทึกข้อมูล");
                return;
            }

            const subject = document.getElementById('subject').value;
            const date = document.getElementById('meetingDate').value;
            const audioData = document.getElementById('audioData').value;

            // ตรวจสอบว่ามีการอัดเสียงหรือไม่
            if (!audioData) {
                alert("⚠️ กรุณาอัดเสียงการประชุมก่อนบันทึกข้อมูล");
                return;
            }

            try {
                // ดาวน์โหลดไฟล์เสียงลงเครื่องคอมพิวเตอร์ (.mp3)
                const safeSubject = subject.replace(/[\/\\?%*:|"<>\s]/g, '_');
                downloadAudio(audioData, safeSubject);

                resetForm();
                alert('ส่งออกและดาวน์โหลดไฟล์เสียง (.mp3) ลงเครื่องคอมพิวเตอร์ของคุณแล้ว');
            } catch (err) {
                alert('เกิดข้อผิดพลาด: ' + err.message);
            }
        }

        function downloadAudio(base64Data, fileName) {
            const link = document.body.appendChild(document.createElement('a'));
            link.href = base64Data;
            link.download = `บันทึกเสียง_${fileName || 'การประชุม'}.mp3`;
            link.click();
            link.remove();
        }

        // เริ่มต้นการตั้งค่าเริ่มต้น
        document.addEventListener('DOMContentLoaded', () => {
            resetForm();
        });
    </script>
</body>
</html>
