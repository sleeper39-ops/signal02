<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเครือข่าย | Communication Dept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .ip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        
        /* Device Borders */
        .device-server { border-left: 6px solid #ef4444 !important; }
        .device-pc { border-left: 6px solid #3b82f6 !important; }
        .device-notebook { border-left: 6px solid #10b981 !important; }
        .device-fax { border-left: 6px solid #f59e0b !important; }
        .device-default { border-left: 6px solid #94a3b8 !important; }

        .badge-red { color: #ef4444; border: 1px solid #fecaca; background: #fef2f2; }
        .badge-blue { color: #3b82f6; border: 1px solid #bfdbfe; background: #eff6ff; }
        .badge-green { color: #10b981; border: 1px solid #a7f3d0; background: #ecfdf5; }
        .badge-gold { color: #b45309; border: 1px solid #fde68a; background: #fffbeb; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-[#1e293b] text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-blue-500/20 p-2 rounded-xl border border-blue-500/30 hover:bg-blue-500/40 transition-all">
                    <i class="ph-bold ph-arrow-left text-xl text-blue-400"></i>
                </a>
                <div>
                    <h1 class="font-bold text-lg leading-none text-white">ระบบจัดการเครือข่าย (NMS)</h1>
                    <span class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">Network Management System</span>
                </div>
            </div>
            <div class="hidden md:flex gap-6 text-sm">
                <div class="flex items-center gap-2"><div class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></div> ใช้งาน IP: <span id="usedCount" class="font-bold text-emerald-400">0</span></div>
                <div class="flex items-center gap-2 border-l border-slate-700 pl-6"><div class="w-2.5 h-2.5 bg-slate-500 rounded-full"></div> ว่าง: <span id="unusedCount" class="font-bold text-slate-400">0</span></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 w-full flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">

            <!-- Sidebar Filters -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 sticky top-24">
                    <div class="flex justify-between items-center mb-4 pl-2 border-l-4 border-blue-500">
                        <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">ฝ่าย / หน่วยงาน</h3>
                        <button onclick="openSettingsModal('dept')" class="text-blue-500 hover:text-blue-700"><i class="ph-bold ph-gear"></i></button>
                    </div>
                    <div class="flex flex-col gap-2" id="deptMenu"></div>

                    <hr class="my-6 border-slate-100">

                    <div class="flex justify-between items-center mb-4 pl-2 border-l-4 border-blue-500">
                        <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">ชนิดอุปกรณ์</h3>
                        <button onclick="openSettingsModal('type')" class="text-blue-500 hover:text-blue-700"><i class="ph-bold ph-gear"></i></button>
                    </div>
                    <div class="flex flex-col gap-2" id="typeMenu"></div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="lg:col-span-4 space-y-6">
                <div class="flex flex-col sm:flex-row gap-4">
                    <button onclick="toggleIpView()" id="btnIpMap" class="flex-1 flex items-center justify-center gap-2 px-6 py-4 rounded-[1.5rem] font-bold transition-all bg-white text-slate-600 hover:bg-blue-50 hover:text-blue-600 border border-slate-200 shadow-sm">
                        <i class="ph-bold ph-squares-four text-xl"></i> ดูแผนผัง IP
                    </button>
                    <button onclick="openModal()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-[1.5rem] flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20 transition-all active:scale-95 border border-blue-500/30">
                        <i class="ph-bold ph-plus-circle text-xl"></i> เพิ่มอุปกรณ์ใหม่
                    </button>
                </div>

                <div class="relative group">
                    <i class="ph ph-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="text" id="searchInput" onkeyup="filterDevices()" placeholder="ค้นหาชื่ออุปกรณ์, หมายเลข IP, ฝ่าย..." class="w-full pl-16 pr-8 py-4 rounded-[1.5rem] border-2 border-transparent focus:border-blue-500 bg-white shadow-sm outline-none transition-all text-base font-medium">
                </div>

                <div id="tableView" class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 border-b border-slate-100">
                                    <th class="px-8 py-5 text-[11px] font-black uppercase tracking-widest">ข้อมูลอุปกรณ์</th>
                                    <th class="px-8 py-5 text-[11px] font-black uppercase tracking-widest">ประเภท</th>
                                    <th class="px-8 py-5 text-[11px] font-black uppercase tracking-widest">หมายเลข IP</th>
                                    <th class="px-8 py-5 text-[11px] font-black uppercase tracking-widest">ฝ่ายที่รับผิดชอบ</th>
                                    <th class="px-8 py-5 text-center text-[11px] font-black uppercase tracking-widest">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="deviceTableBody" class="divide-y divide-slate-50 font-medium text-slate-700"></tbody>
                        </table>
                    </div>
                </div>

                <div id="ipMapView" class="hidden bg-white p-10 rounded-[2rem] shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-3">
                        <i class="ph-bold ph-network text-blue-500"></i> แผนผังไอพี (192.168.10.x)
                    </h2>
                    <div class="ip-grid" id="ipGridContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="deviceModal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200">
            <div class="px-10 py-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800" id="modalTitle">ลงทะเบียนอุปกรณ์</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-200 text-slate-400 transition-all">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>

            <form id="deviceForm" onsubmit="handleSave(event)" class="p-10 space-y-6 text-sm">
                <input type="hidden" id="deviceId">
                <div>
                    <label class="block font-black text-slate-400 mb-2 uppercase text-[10px] tracking-widest pl-1">ชื่ออุปกรณ์ / รายละเอียด</label>
                    <input type="text" id="deviceName" required class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold" placeholder="เช่น PC-ADMIN-01">
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block font-black text-slate-400 mb-2 uppercase text-[10px] tracking-widest pl-1">ประเภทอุปกรณ์</label>
                        <select id="deviceType" required class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold appearance-none">
                            <option value="PC">คอมพิวเตอร์ (PC)</option>
                            <option value="Notebook">โน้ตบุ๊ก (Notebook)</option>
                            <option value="Printer">ปริ้นเตอร์ (Printer)</option>
                            <option value="Mobile">มือถือ (Mobile)</option>
                            <option value="iPad">ไอแพด (iPad)</option>
                            <option value="Server">เซิร์ฟเวอร์ (Server)</option>
                            <option value="Router">เราเตอร์ (Router/Wi-Fi)</option>
                            <option value="Switch">สวิตช์ฮับ (Switch)</option>
                            <option value="Fax">แฟกซ์ (Fax)</option>
                            <option value="Other">อุปกรณ์อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-black text-slate-400 mb-2 uppercase text-[10px] tracking-widest pl-1">หมายเลข IP Address</label>
                        <input type="text" id="deviceIp" class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-bold text-blue-600" placeholder="192.168.10.x">
                    </div>
                </div>
                <div>
                    <label class="block font-black text-slate-400 mb-2 uppercase text-[10px] tracking-widest pl-1">ฝ่ายที่รับผิดชอบ</label>
                    <select id="deviceDept" required class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold appearance-none">
                        <option value="ส่วนกลาง">ส่วนกลาง / ระบบหลัก</option>
                        <option value="ศสส.">ศสส.</option>
                        <option value="ฝขว.">ฝขว.</option>
                        <option value="ฝยก.">ฝยก.</option>
                        <option value="หน่วย 250">หน่วย 250.</option>
                        <option value="ปจว.">ปจว.</option>
                        <option value="ฝปส.">ฝปส.</option>
                        <option value="ฝยส.">ฝยส.</option>
                        <option value="ศสน.">ศสน.</option>
                    </select>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 px-8 py-3.5 rounded-2xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all border border-slate-200">ยกเลิก</button>
                    <button type="submit" class="flex-1 px-8 py-3.5 rounded-2xl font-bold bg-blue-600 text-white hover:bg-blue-700 shadow-lg transition-all transform active:scale-95 uppercase text-xs tracking-widest">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md overflow-hidden border border-slate-200">
            <div class="px-8 py-5 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800" id="settingsModalTitle">จัดการตั้งค่า</h3>
                <button onclick="closeSettingsModal()" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-slate-200 text-slate-400 transition-all">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            <div class="p-8 space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="newSettingValue" class="flex-1 px-4 py-2 rounded-xl border border-slate-200 outline-none focus:border-blue-500 bg-slate-50 font-semibold text-sm" placeholder="เพิ่มรายการใหม่...">
                    <button onclick="addSetting()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all">เพิ่ม</button>
                </div>
                <div id="settingsList" class="max-h-60 overflow-y-auto space-y-2 pr-2">
                    <!-- List items will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnbOpvNTZ1bNFzReLXMq_wW4kp5iB5oiE",
            authDomain: "signal02-f4d85.firebaseapp.com",
            databaseURL: "https://signal02-f4d85-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "signal02-f4d85",
            storageBucket: "signal02-f4d85.firebasestorage.app",
            messagingSenderId: "653019128612",
            appId: "1:653019128612:web:41d283659202787c4689b1",
            measurementId: "G-3G3TQ0VLXM"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let devices = []; 
        let currentDept = 'ทั้งหมด';
        let currentTypeFilter = 'ทั้งหมด';
        let viewMode = 'table';
        let currentSettingsMode = ''; // 'dept' or 'type'

        let depts = ['ทั้งหมด', 'ส่วนกลาง', 'ศสส.', 'ฝขว.', 'ฝยก.', 'หน่วย 250', 'ปจว.', 'ฝปส.', 'ฝยส.', 'ศสน.'];
        let types = ['ทั้งหมด', 'Server', 'PC', 'Notebook', 'Fax', 'Printer', 'Mobile', 'iPad', 'Router', 'Switch'];

        function loadData() {
            // Load Devices
            db.ref('devices').on('value', (snapshot) => {
                const data = snapshot.val();
                devices = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                renderFilters();
                if(viewMode === 'ipmap') renderIpMap(); else filterDevices();
            });

            // Load Settings - Depts
            db.ref('settings/depts').on('value', snapshot => {
                const val = snapshot.val();
                if(val) depts = ['ทั้งหมด', ...val];
                renderFilters();
                updateFormOptions();
            });

            // Load Settings - Types
            db.ref('settings/types').on('value', snapshot => {
                const val = snapshot.val();
                if(val) types = ['ทั้งหมด', ...val];
                renderFilters();
                updateFormOptions();
            });
        }

        function updateFormOptions() {
            const deptSelect = document.getElementById('deviceDept');
            const typeSelect = document.getElementById('deviceType');
            
            if(deptSelect) {
                const currentVal = deptSelect.value;
                deptSelect.innerHTML = depts.filter(d => d !== 'ทั้งหมด').map(d => `<option value="${d}">${d}</option>`).join('');
                if(currentVal && depts.includes(currentVal)) deptSelect.value = currentVal;
            }
            
            if(typeSelect) {
                const currentVal = typeSelect.value;
                typeSelect.innerHTML = types.filter(t => t !== 'ทั้งหมด').map(t => `<option value="${t}">${t}</option>`).join('');
                if(currentVal && types.includes(currentVal)) typeSelect.value = currentVal;
            }
        }

        function parseIP(ip) {
            if (!ip || ip === '-') return [999, 999, 999, 999];
            let parts = ip.split('.').map(Number);
            return parts.length === 4 ? parts : [999, 999, 999, 999];
        }

        function sortDevicesByIP(list) {
            return list.sort((a, b) => {
                const ipA = parseIP(a.ip);
                const ipB = parseIP(b.ip);
                for (let i = 0; i < 4; i++) {
                    if (ipA[i] !== ipB[i]) return ipA[i] - ipB[i];
                }
                return 0;
            });
        }

        function getDeviceTypeClass(type) {
            switch(type) {
                case 'Server': return 'device-server';
                case 'PC': return 'device-pc';
                case 'Notebook': return 'device-notebook';
                case 'Fax': return 'device-fax';
                default: return 'device-default';
            }
        }

        function getBadgeStyle(type) {
            switch(type) {
                case 'Server': return 'badge-red border-red-500/50 bg-red-50/50';
                case 'PC': return 'badge-blue border-blue-500/50 bg-blue-50/50';
                case 'Notebook': return 'badge-green border-emerald-500/50 bg-emerald-50/50';
                case 'Fax': return 'badge-gold border-amber-500/50 bg-amber-50/50';
                default: return 'badge-gold border-slate-400/50 bg-slate-50/50';
            }
        }

        function getDeviceIcon(type) {
            const icons = {
                'PC': 'ph-bold ph-desktop', 'Notebook': 'ph-bold ph-laptop', 'Printer': 'ph-bold ph-printer',
                'Mobile': 'ph-bold ph-device-mobile', 'iPad': 'ph-bold ph-device-tablet',
                'Server': 'ph-bold ph-hard-drives', 'Router': 'ph-bold ph-wifi-high', 'Switch': 'ph-bold ph-git-merge',
                'Fax': 'ph-bold ph-printer'
            };
            return icons[type] || 'ph-bold ph-cpu';
        }

        function renderFilters() {
            const deptContainer = document.getElementById('deptMenu');
            deptContainer.innerHTML = depts.map(d => `
                <button onclick="setFilter('dept', '${d}')" class="flex justify-between items-center px-4 py-3 rounded-xl font-bold transition-all ${currentDept === d ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200'}">
                    <span class="text-sm">${d}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-lg ${currentDept === d ? 'bg-white/20' : 'bg-slate-200'}">
                        ${d === 'ทั้งหมด' ? devices.length : devices.filter(x => x.dept === d).length}
                    </span>
                </button>
            `).join('');

            const typeContainer = document.getElementById('typeMenu');
            typeContainer.innerHTML = types.map(t => `
                <button onclick="setFilter('type', '${t}')" class="flex justify-between items-center px-4 py-3 rounded-xl font-bold transition-all ${currentTypeFilter === t ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200'}">
                    <span class="text-sm">${t}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-lg ${currentTypeFilter === t ? 'bg-white/20' : 'bg-slate-200'}">
                        ${t === 'ทั้งหมด' ? devices.length : devices.filter(x => x.type === t).length}
                    </span>
                </button>
            `).join('');
        }

        function renderTable(dataToRender) {
            const tbody = document.getElementById('deviceTableBody');
            const sortedData = sortDevicesByIP([...dataToRender]);

            if (sortedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-24 text-center text-slate-300 font-bold italic tracking-widest uppercase">ไม่พบข้อมูลอุปกรณ์</td></tr>`;
                updateStats(); return;
            }

            tbody.innerHTML = sortedData.map(d => `
                <tr class="hover:bg-slate-50/50 transition-all ${getDeviceTypeClass(d.type)} bg-white">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-50 border border-slate-100 text-slate-600">
                                <i class="${getDeviceIcon(d.type)} text-xl"></i>
                            </div>
                            <span class="font-bold text-slate-800 tracking-tight">${d.name}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-sm">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase border tracking-widest ${getBadgeStyle(d.type)}">
                            ${d.type}
                        </span>
                    </td>
                    <td class="px-8 py-5 font-bold text-blue-600 text-[13px]">${d.ip || '-'}</td>
                    <td class="px-8 py-5">
                        <span class="px-3 py-1 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-500">
                            ${d.dept}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editDevice('${d.id}')" class="w-9 h-9 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center shadow-sm border border-blue-100"><i class="ph-bold ph-pencil text-sm"></i></button>
                            <button onclick="deleteDevice('${d.id}')" class="w-9 h-9 rounded-xl bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center shadow-sm border border-red-100"><i class="ph-bold ph-trash text-sm"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            updateStats();
        }

        function renderIpMap() {
            const container = document.getElementById('ipGridContainer');
            let html = '';
            let used = 0;
            for(let i = 1; i <= 255; i++) {
                const ipStr = `192.168.10.${i}`;
                const device = devices.find(d => d.ip === ipStr);
                if(device) {
                    used++;
                    html += `
                        <div onclick="editDevice('${device.id}')" class="p-3 rounded-xl border-2 ${getBadgeStyle(device.type)} cursor-pointer text-center shadow-md hover:scale-105 transition-all relative group">
                            <div class="text-[10px] font-black opacity-60 mb-1 leading-none">.${i}</div>
                            <i class="${getDeviceIcon(device.type)} text-xl mb-1"></i>
                            <div class="text-[9px] font-bold text-slate-700 truncate w-full px-1" title="${device.name}">${device.name}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div onclick="addWithIp('${ipStr}')" class="p-3 rounded-xl bg-white border-2 border-dashed border-slate-300 text-slate-400 hover:border-blue-400 hover:bg-blue-50/30 hover:text-blue-500 cursor-pointer text-center group transition-all shadow-sm">
                            <div class="text-[11px] font-black mb-1 leading-none text-slate-500">.${i}</div>
                            <i class="ph-bold ph-plus opacity-40 group-hover:opacity-100 text-sm transition-opacity"></i>
                            <div class="h-3"></div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
            updateStats(used);
        }

        // Settings Management
        function openSettingsModal(mode) {
            currentSettingsMode = mode;
            const title = mode === 'dept' ? 'จัดการรายชื่อฝ่าย/หน่วยงาน' : 'จัดการชนิดอุปกรณ์';
            document.getElementById('settingsModalTitle').innerText = title;
            document.getElementById('settingsModal').classList.remove('hidden');
            renderSettingsList();
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.add('hidden');
            document.getElementById('newSettingValue').value = '';
        }

        function renderSettingsList() {
            const list = currentSettingsMode === 'dept' ? depts : types;
            const container = document.getElementById('settingsList');
            container.innerHTML = list.filter(item => item !== 'ทั้งหมด').map(item => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <span class="text-sm font-bold text-slate-700">${item}</span>
                    <button onclick="removeSetting('${item}')" class="text-red-500 hover:text-red-700"><i class="ph-bold ph-trash"></i></button>
                </div>
            `).join('');
        }

        function addSetting() {
            const input = document.getElementById('newSettingValue');
            const val = input.value.trim();
            if(!val) return;
            
            const list = currentSettingsMode === 'dept' ? depts : types;
            if(list.includes(val)) {
                alert('มีรายการนี้อยู่แล้ว');
                return;
            }
            
            const newList = [...list.filter(i => i !== 'ทั้งหมด'), val];
            const path = currentSettingsMode === 'dept' ? 'settings/depts' : 'settings/types';
            
            db.ref(path).set(newList).then(() => {
                input.value = '';
                renderSettingsList();
            });
        }

        function removeSetting(val) {
            if(!confirm(`ยืนยันการลบ "${val}"?`)) return;
            
            const list = currentSettingsMode === 'dept' ? depts : types;
            const newList = list.filter(i => i !== 'ทั้งหมด' && i !== val);
            const path = currentSettingsMode === 'dept' ? 'settings/depts' : 'settings/types';
            
            db.ref(path).set(newList).then(() => {
                renderSettingsList();
            });
        }

        function setFilter(type, value) {
            if(type === 'dept') currentDept = value;
            else currentTypeFilter = value;
            viewMode = 'table';
            document.getElementById('tableView').classList.remove('hidden');
            document.getElementById('ipMapView').classList.add('hidden');
            renderFilters();
            filterDevices();
        }

        function toggleIpView() {
            if (viewMode === 'ipmap') {
                viewMode = 'table';
                document.getElementById('tableView').classList.remove('hidden');
                document.getElementById('ipMapView').classList.add('hidden');
            } else {
                viewMode = 'ipmap';
                document.getElementById('tableView').classList.add('hidden');
                document.getElementById('ipMapView').classList.remove('hidden');
                renderIpMap();
            }
        }

        function filterDevices() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = devices.filter(d => {
                const matchDept = (currentDept === 'ทั้งหมด' || d.dept === currentDept);
                const matchType = (currentTypeFilter === 'ทั้งหมด' || d.type === currentTypeFilter);
                const matchQuery = (d.name.toLowerCase().includes(q) || (d.ip && d.ip.toLowerCase().includes(q)));
                return matchDept && matchType && matchQuery;
            });
            renderTable(filtered);
        }

        function updateStats(usedCount = null) {
            const used = usedCount !== null ? usedCount : devices.filter(d => d.ip && d.ip.startsWith('192.168.10.')).length;
            document.getElementById('usedCount').innerText = used;
            document.getElementById('unusedCount').innerText = 255 - used;
        }

        function openModal(id = null) {
            const m = document.getElementById('deviceModal');
            document.getElementById('deviceForm').reset();
            document.getElementById('deviceId').value = '';
            document.getElementById('modalTitle').innerText = 'ลงทะเบียนอุปกรณ์ใหม่';
            if(id) {
                const d = devices.find(x => x.id === id);
                document.getElementById('deviceId').value = d.id;
                document.getElementById('deviceName').value = d.name;
                document.getElementById('deviceType').value = d.type;
                document.getElementById('deviceIp').value = d.ip || '';
                document.getElementById('deviceDept').value = d.dept;
                document.getElementById('modalTitle').innerText = 'แก้ไขรายละเอียดอุปกรณ์';
            }
            m.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('deviceModal').classList.add('hidden'); }

        function handleSave(event) {
            event.preventDefault();
            const id = document.getElementById('deviceId').value;
            const data = {
                name: document.getElementById('deviceName').value,
                type: document.getElementById('deviceType').value,
                ip: document.getElementById('deviceIp').value,
                dept: document.getElementById('deviceDept').value
            };
            
            if(id) {
                db.ref('devices/' + id).set(data)
                    .then(() => closeModal())
                    .catch(err => alert('เกิดข้อผิดพลาด: ' + err.message));
            } else {
                db.ref('devices').push(data)
                    .then(() => closeModal())
                    .catch(err => alert('เกิดข้อผิดพลาด: ' + err.message));
            }
        }

        function addWithIp(ip) { openModal(); document.getElementById('deviceIp').value = ip; }
        function editDevice(id) { openModal(id); }
        function deleteDevice(id) { 
            if(confirm('⚠️ ยืนยันการลบข้อมูลอุปกรณ์นี้ออกจากระบบ?')) { 
                db.ref('devices/' + id).remove()
                    .catch(err => alert('เกิดข้อผิดพลาด: ' + err.message));
            } 
        }

        window.onload = () => { loadData(); };
    </script>
</body>
</html>
