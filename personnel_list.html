                <button onclick="openPersonnelModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-xl flex items-center gap-2 text-sm transition-all shadow-lg shadow-blue-500/20">

    <main class="max-w-7xl mx-auto px-6 py-8 w-full flex-grow">
        <!-- Search and Filter -->
        <div class="mb-8 relative group">
            <i class="ph ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-xl group-focus-within:text-blue-500 transition-colors"></i>
            <input type="text" id="searchInput" onkeyup="filterPersonnel()" placeholder="ค้นหาชื่อ-สกุล, ตำแหน่ง, เบอร์โทรศัพท์..." class="w-full pl-14 pr-6 py-4 rounded-2xl border border-slate-200 focus:border-blue-500 bg-white shadow-sm outline-none transition-all text-base font-medium">
        </div>

        <!-- Table Content -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">

                        <tr class="bg-slate-50 text-slate-500 border-b border-slate-100">

                            <th class="px-8 py-5 text-sm font-black uppercase tracking-widest">ตำแหน่งในสนาม</th>
                            <th class="px-8 py-5 text-sm font-black uppercase tracking-widest">เบอร์โทรศัพท์</th>
                            <th class="px-8 py-5 text-sm font-black uppercase tracking-widest">หมายเหตุ</th>
                            <th class="px-8 py-5 text-center text-sm font-black uppercase tracking-widest w-32">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="personnelTableBody">

                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Personnel Modal -->
    <div id="personnelModal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200">
            <div class="px-8 py-5 bg-white border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800" id="personnelModalTitle">เพิ่มข้อมูลกำลังพล</h3>
                <button onclick="closePersonnelModal()" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-slate-100 text-slate-400">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            <form id="personnelForm" onsubmit="handleSavePersonnel(event)" class="p-8 space-y-4">
                <input type="hidden" id="personnelId">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">หมวดหมู่ / ฝ่าย</label>
                    <select id="categorySelect" required class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">ยศ - ชื่อ - สกุล</label>
                    <input type="text" id="fullName" required class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold" placeholder="เช่น พ.อ. สมชาย ใจดี">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">ตำแหน่งในสนาม</label>
                    <input type="text" id="position" required class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-semibold" placeholder="เช่น ผบ.บก.ควบคุม 2">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">เบอร์โทรศัพท์</label>
                    <input type="text" id="phone" class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none bg-slate-50 font-bold text-blue-600" placeholder="08x-xxxxxxx">

    <!-- Category Modal -->

                <button onclick="closeCategoryModal()" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-slate-100 text-slate-400">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            <div class="p-8 space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="newCategoryName" class="flex-1 px-4 py-2 rounded-xl border border-slate-200 outline-none focus:border-blue-500 bg-slate-50 text-sm font-semibold" placeholder="เพิ่มหมวดหมู่ใหม่...">
                    <button onclick="addCategory()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all">เพิ่ม</button>

                </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnbOpvNTZ1bNFzReLXMq_wW4kp5iB5oiE",
            authDomain: "signal02-f4d85.firebaseapp.com",
            databaseURL: "https://signal02-f4d85-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "signal02-f4d85",
            storageBucket: "signal02-f4d85.firebasestorage.app",
            messagingSenderId: "653019128612",
            appId: "1:653019128612:web:41d283659202787c4689b1",
            measurementId: "G-3G3TQ0VLXM"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let personnel = [];
        let categories = [];

        function loadData() {
            // Load Page Title
            db.ref('personnel_settings/page_title').on('value', snapshot => {
                const title = snapshot.val();
                if (title) {
                    document.getElementById('pageTitleDisplay').innerText = title;
                }
            });

            // Load Categories
            db.ref('personnel_settings/categories').on('value', snapshot => {
                const data = snapshot.val();
                categories = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                renderCategoryOptions();
                renderCategoryList();
                renderPersonnel();
            });

            // Load Personnel
            db.ref('personnel').on('value', snapshot => {
                const data = snapshot.val();
                personnel = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                renderPersonnel();
            });
        }

        function renderPersonnel() {
            const tbody = document.getElementById('personnelTableBody');
            const q = document.getElementById('searchInput').value.toLowerCase();
            
            // Filter
            const filtered = personnel.filter(p => 
                p.fullName.toLowerCase().includes(q) || 
                p.position.toLowerCase().includes(q) || 
                (p.phone && p.phone.toLowerCase().includes(q))
            );

            // Sort categories by order
            const sortedCategories = [...categories].sort((a, b) => (a.order || 0) - (b.order || 0));
            
            let html = '';
            sortedCategories.forEach(cat => {
                const catMembers = filtered.filter(p => p.categoryId === cat.id);
                if (catMembers.length > 0 || q === '') {
                    html += `
                        <tr class="category-header">
                            <td colspan="5" class="px-8 py-3 font-black text-blue-800 text-sm tracking-wide uppercase">${cat.name}</td>
                        </tr>
                    `;
                    catMembers.forEach(p => {
                        html += `
                            <tr class="hover:bg-slate-50 transition-all border-b border-slate-50">
                                <td class="px-8 py-4 font-bold text-slate-800">${p.fullName}</td>
                                <td class="px-8 py-4 text-sm font-semibold text-slate-600">${p.position}</td>
                                <td class="px-8 py-4 font-bold text-blue-600">${p.phone || '-'}</td>
                                <td class="px-8 py-4 text-xs font-medium text-slate-400">${p.note || ''}</td>
                                <td class="px-8 py-4 text-center">
                                    <div class="flex justify-center gap-2">
                                        <button onclick="editPersonnel('${p.id}')" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white flex items-center justify-center transition-all"><i class="ph-bold ph-pencil-simple text-sm"></i></button>
                                        <button onclick="deletePersonnel('${p.id}')" class="w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white flex items-center justify-center transition-all"><i class="ph-bold ph-trash text-sm"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }
            });

            if (html === '') {
                html = '<tr><td colspan="5" class="py-20 text-center text-slate-300 font-bold uppercase tracking-widest italic">ไม่พบข้อมูลรายชื่อ</td></tr>';
            }
            tbody.innerHTML = html;
        }

        function filterPersonnel() { renderPersonnel(); }

        // Personnel Management
        function openPersonnelModal(id = null) {
            const form = document.getElementById('personnelForm');
            form.reset();
            document.getElementById('personnelId').value = '';
            document.getElementById('personnelModalTitle').innerText = 'เพิ่มข้อมูลกำลังพล';
            
            if(id) {
                const p = personnel.find(x => x.id === id);
                document.getElementById('personnelId').value = p.id;
                document.getElementById('categorySelect').value = p.categoryId;
                document.getElementById('fullName').value = p.fullName;
                document.getElementById('position').value = p.position;
                document.getElementById('phone').value = p.phone || '';
                document.getElementById('note').value = p.note || '';
                document.getElementById('personnelModalTitle').innerText = 'แก้ไขข้อมูลกำลังพล';
            }
            document.getElementById('personnelModal').classList.remove('hidden');
        }

        function closePersonnelModal() { document.getElementById('personnelModal').classList.add('hidden'); }

        async function handleSavePersonnel(event) {
            event.preventDefault();
            const id = document.getElementById('personnelId').value;
            const data = {
                categoryId: document.getElementById('categorySelect').value,
                fullName: document.getElementById('fullName').value,
                position: document.getElementById('position').value,
                phone: document.getElementById('phone').value,
                note: document.getElementById('note').value,
                updatedAt: Date.now()
            };
            
            try {
                if(id) await db.ref('personnel/' + id).update(data);
                else await db.ref('personnel').push(data);
                closePersonnelModal();
            } catch (err) { alert('Error: ' + err.message); }
        }

        function editPersonnel(id) { openPersonnelModal(id); }
        function deletePersonnel(id) {
            if(confirm('ยืนยันการลบรายชื่อนี้?')) db.ref('personnel/' + id).remove();
        }

        // Page Title Management
        function editPageTitle() {
            const currentTitle = document.getElementById('pageTitleDisplay').innerText;
            const newTitle = prompt('แก้ไขชื่อหัวข้อระบบ:', currentTitle);
            if (newTitle !== null && newTitle.trim() !== '') {
                db.ref('personnel_settings/page_title').set(newTitle.trim());
            }
        }

        // Category Management
        function openCategoryModal() { document.getElementById('categoryModal').classList.remove('hidden'); }
        function closeCategoryModal() { document.getElementById('categoryModal').classList.add('hidden'); }

        function renderCategoryOptions() {
            const select = document.getElementById('categorySelect');
            const sorted = [...categories].sort((a, b) => (a.order || 0) - (b.order || 0));
            select.innerHTML = '<option value="" disabled selected>เลือกหมวดหมู่ / ฝ่าย</option>' + 
                sorted.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function renderCategoryList() {
            const list = document.getElementById('categoryList');
            const sorted = [...categories].sort((a, b) => (a.order || 0) - (b.order || 0));
            list.innerHTML = sorted.map(c => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <span class="text-sm font-bold text-slate-700">${c.name}</span>
                    <div class="flex gap-1">
                        <button onclick="moveCategory('${c.id}', -1)" class="p-1.5 text-slate-400 hover:text-blue-500"><i class="ph ph-caret-up"></i></button>
                        <button onclick="moveCategory('${c.id}', 1)" class="p-1.5 text-slate-400 hover:text-blue-500"><i class="ph ph-caret-down"></i></button>
                        <button onclick="deleteCategory('${c.id}')" class="p-1.5 text-red-400 hover:text-red-600"><i class="ph ph-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            if(!name) return;
            const order = categories.length > 0 ? Math.max(...categories.map(c => c.order || 0)) + 1 : 0;
            await db.ref('personnel_settings/categories').push({ name, order });
            document.getElementById('newCategoryName').value = '';
        }

        async function deleteCategory(id) {
            if(confirm('การลบหมวดหมู่จะทำให้รายชื่อในหมวดนี้ไม่แสดงผล ยืนยันการลบ?')) {
                await db.ref('personnel_settings/categories/' + id).remove();
            }
        }

        async function moveCategory(id, direction) {
            const sorted = [...categories].sort((a, b) => (a.order || 0) - (b.order || 0));
            const idx = sorted.findIndex(c => c.id === id);
            const nextIdx = idx + direction;
            if(nextIdx >= 0 && nextIdx < sorted.length) {
                const tempOrder = sorted[idx].order;
                sorted[idx].order = sorted[nextIdx].order;
                sorted[nextIdx].order = tempOrder;
                await db.ref('personnel_settings/categories/' + sorted[idx].id).update({ order: sorted[idx].order });
                await db.ref('personnel_settings/categories/' + sorted[nextIdx].id).update({ order: sorted[nextIdx].order });
            }
        }
