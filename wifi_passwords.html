<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รหัสไวไฟ บก.ควบคุม 2 | Communication Dept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .category-header { background: #f0fdf4; border-left: 5px solid #22c55e; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-[#1e293b] text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-green-500/20 p-2 rounded-xl border border-green-500/30 hover:bg-green-500/40 transition-all">
                    <i class="ph-bold ph-arrow-left text-xl text-green-400"></i>
                </a>
                <div>
                    <h1 class="font-bold text-lg leading-none text-white">รหัสไวไฟ บก.ควบคุม 2</h1>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="seedInitialData()" class="bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 py-2 rounded-xl flex items-center gap-2 text-sm transition-all shadow-lg shadow-amber-500/20">
                    <i class="ph-bold ph-magic-wand"></i> โหลดข้อมูลตามรูปภาพ
                </button>
                <button onclick="openWifiModal()" class="bg-green-600 hover:bg-green-700 text-white font-bold px-4 py-2 rounded-xl flex items-center gap-2 text-sm transition-all shadow-lg shadow-green-500/20">
                    <i class="ph-bold ph-plus"></i> เพิ่มรหัสไวไฟ
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 w-full flex-grow">
        <!-- Search -->
        <div class="mb-8 relative group">
            <i class="ph ph-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-xl group-focus-within:text-green-500 transition-colors"></i>
            <input type="text" id="searchInput" onkeyup="renderWifi()" placeholder="ค้นหาชื่อไวไฟ, สถานที่, รหัสผ่าน..." class="w-full pl-14 pr-6 py-4 rounded-2xl border border-slate-200 focus:border-green-500 bg-white shadow-sm outline-none transition-all text-base font-medium">
        </div>

        <!-- WiFi List Table -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 border-b border-slate-100">
                            <th class="px-8 py-5 text-sm font-black uppercase tracking-widest">สถานที่ / ห้อง</th>
                            <th class="px-8 py-5 text-sm font-black uppercase tracking-widest">ชื่อไวไฟ (SSID)</th>
                            <th class="px-8 py-5 text-sm font-black uppercase tracking-widest">รหัสผ่าน (Password)</th>
                            <th class="px-8 py-5 text-sm font-black uppercase tracking-widest">หมายเหตุ</th>
                            <th class="px-8 py-5 text-center text-sm font-black uppercase tracking-widest w-32">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="wifiTableBody">
                        <!-- Content will be injected by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Wifi Modal -->
    <div id="wifiModal" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200">
            <div class="px-8 py-5 bg-white border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800" id="wifiModalTitle">เพิ่มข้อมูลรหัสไวไฟ</h3>
                <button onclick="closeWifiModal()" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-slate-100 text-slate-400">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            <form id="wifiForm" onsubmit="handleSaveWifi(event)" class="p-8 space-y-4">
                <input type="hidden" id="wifiId">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">สถานที่ / ห้อง</label>
                    <input type="text" id="location" required class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-green-500 outline-none bg-slate-50 font-semibold" placeholder="เช่น ห้องทำงาน ผบ.">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">ชื่อไวไฟ (SSID)</label>
                    <input type="text" id="ssid" required class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-green-500 outline-none bg-slate-50 font-bold text-green-600" placeholder="เช่น Army02">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">รหัสผ่าน (Password)</label>
                    <input type="text" id="password" class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-green-500 outline-none bg-slate-50 font-bold text-blue-600" placeholder="รหัสผ่าน หรือ 'ไม่มี'">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 pl-1">หมายเหตุ</label>
                    <input type="text" id="note" class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:border-green-500 outline-none bg-slate-50 font-semibold" placeholder="ระบุรายละเอียดเพิ่มเติม">
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeWifiModal()" class="flex-1 py-3 rounded-xl font-bold bg-slate-100 text-slate-500 hover:bg-slate-200">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-3 rounded-xl font-bold bg-green-600 text-white hover:bg-green-700 shadow-lg shadow-green-500/20">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnbOpvNTZ1bNFzReLXMq_wW4kp5iB5oiE",
            authDomain: "signal02-f4d85.firebaseapp.com",
            databaseURL: "https://signal02-f4d85-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "signal02-f4d85",
            storageBucket: "signal02-f4d85.firebasestorage.app",
            messagingSenderId: "653019128612",
            appId: "1:653019128612:web:41d283659202787c4689b1",
            measurementId: "G-3G3TQ0VLXM"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let wifiData = [];

        function loadData() {
            db.ref('wifi_passwords').on('value', snapshot => {
                const data = snapshot.val();
                wifiData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                renderWifi();
            });
        }

        function renderWifi() {
            const tbody = document.getElementById('wifiTableBody');
            const q = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = wifiData.filter(w => 
                w.location.toLowerCase().includes(q) || 
                w.ssid.toLowerCase().includes(q) ||
                (w.password && w.password.toLowerCase().includes(q))
            );

            // Grouping by location prefix for visual grouping (optional)
            let html = '';
            filtered.forEach(w => {
                html += `
                    <tr class="hover:bg-slate-50 transition-all border-b border-slate-50">
                        <td class="px-8 py-4 font-bold text-slate-800">${w.location}</td>
                        <td class="px-8 py-4 font-bold text-green-600 tracking-tight">${w.ssid}</td>
                        <td class="px-8 py-4 font-bold text-blue-600 tracking-wider">${w.password || 'ไม่มี'}</td>
                        <td class="px-8 py-4 text-xs font-medium text-slate-400">${w.note || ''}</td>
                        <td class="px-8 py-4 text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="editWifi('${w.id}')" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white flex items-center justify-center transition-all"><i class="ph-bold ph-pencil-simple text-sm"></i></button>
                                <button onclick="deleteWifi('${w.id}')" class="w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white flex items-center justify-center transition-all"><i class="ph-bold ph-trash text-sm"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            if (html === '') {
                html = '<tr><td colspan="5" class="py-20 text-center text-slate-300 font-bold uppercase tracking-widest italic">ไม่พบข้อมูลรหัสไวไฟ</td></tr>';
            }
            tbody.innerHTML = html;
        }

        function openWifiModal(id = null) {
            const form = document.getElementById('wifiForm');
            form.reset();
            document.getElementById('wifiId').value = '';
            document.getElementById('wifiModalTitle').innerText = 'เพิ่มข้อมูลรหัสไวไฟ';
            
            if(id) {
                const w = wifiData.find(x => x.id === id);
                document.getElementById('wifiId').value = w.id;
                document.getElementById('location').value = w.location;
                document.getElementById('ssid').value = w.ssid;
                document.getElementById('password').value = w.password || '';
                document.getElementById('note').value = w.note || '';
                document.getElementById('wifiModalTitle').innerText = 'แก้ไขข้อมูลรหัสไวไฟ';
            }
            document.getElementById('wifiModal').classList.remove('hidden');
        }

        function closeWifiModal() { document.getElementById('wifiModal').classList.add('hidden'); }

        async function handleSaveWifi(event) {
            event.preventDefault();
            const id = document.getElementById('wifiId').value;
            const data = {
                location: document.getElementById('location').value,
                ssid: document.getElementById('ssid').value,
                password: document.getElementById('password').value,
                note: document.getElementById('note').value,
                updatedAt: Date.now()
            };
            
            try {
                if(id) await db.ref('wifi_passwords/' + id).update(data);
                else await db.ref('wifi_passwords').push(data);
                closeWifiModal();
            } catch (err) { alert('Error: ' + err.message); }
        }

        function editWifi(id) { openWifiModal(id); }
        function deleteWifi(id) {
            if(confirm('ยืนยันการลบข้อมูลนี้?')) db.ref('wifi_passwords/' + id).remove();
        }

        async function seedInitialData() {
            if (!confirm('ยืนยันการโหลดข้อมูลตั้งต้นจากรูปภาพ?')) return;
            
            const data = [
                { location: "(ห้องทำงาน ผบ.)", ssid: "Commander1_2.4G/5G", password: "password111" },
                { location: "(ห้องทำงาน รอง ผบ.)", ssid: "Commander2_2.4G/5G", password: "password" },
                { location: "(ชั้น 1) Army02-05 5G ต้อง Fix IP", ssid: "Army02", password: "password02" },
                { location: "(ชั้น 1)", ssid: "Army03", password: "password03" },
                { location: "(ชั้น 1)", ssid: "Army04", password: "password04" },
                { location: "(ชั้น 1)", ssid: "Army05", password: "password05" },
                { location: "(ชั้น 1)", ssid: "Army06", password: "password06" },
                { location: "(ชั้น 1)", ssid: "ชกส.", password: "password222" },
                { location: "(ชั้น 1)", ssid: "ห้องประชุม", password: "ไม่มี" },
                { location: "(ชั้น 1)", ssid: "ห้องอาหาร", password: "ไม่มี" },
                { location: "(ชั้น 2)", ssid: "2/1", password: "-" },
                { location: "(ชั้น 2)", ssid: "2/2", password: "passwd22" },
                { location: "(ชั้น 2)", ssid: "2/3", password: "passwd23" },
                { location: "(ชั้น 2)", ssid: "2/4", password: "passwd24" },
                { location: "(ชั้น 2)", ssid: "2/5", password: "passwd25" },
                { location: "(ชั้น 2)", ssid: "2/5Ext", password: "passwd25" },
                { location: "(ชั้น 2)", ssid: "2/6", password: "passwd26" },
                { location: "(ชั้น 3)", ssid: "3/1", password: "passwd31" },
                { location: "(ชั้น 3)", ssid: "3/2", password: "passwd32" },
                { location: "(ชั้น 3)", ssid: "3/3", password: "passwd33" },
                { location: "(ชั้น 3)", ssid: "3/3 Ext", password: "passwd33" }
            ];

            try {
                if (confirm('ต้องการล้างข้อมูลเดิมก่อนโหลดใหม่หรือไม่?')) {
                    await db.ref('wifi_passwords').remove();
                }

                for (let i = 0; i < data.length; i++) {
                    await db.ref('wifi_passwords').push({
                        ...data[i],
                        order: i,
                        updatedAt: Date.now()
                    });
                }
                alert('โหลดข้อมูลรหัสไวไฟเรียบร้อยแล้ว!');
            } catch (err) {
                alert('เกิดข้อผิดพลาด: ' + err.message);
            }
        }

        loadData();
    </script>
</body>
</html>
